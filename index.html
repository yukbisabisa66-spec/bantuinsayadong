<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor</title>
    <style>
        :root {
            --gold: #D4AF37; --gold-dark: #B8860B;
            --bg: #0A0A0B; --card: #1C1C1E;
            --text: #FFFFFF; --subtext: #8E8E93;
            --border: rgba(255, 255, 255, 0.08);
            --red: #FF453A; --green: #32D74B;
            --blue: #0A84FF; --shadow: rgba(0,0,0,0.5);
        }

        [data-theme="light"] {
            --bg: #F2F2F7; --card: #FFFFFF;
            --text: #000000; --subtext: #636366;
            --border: rgba(0, 0, 0, 0.05);
            --shadow: rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 400px; position: relative; }

        /* HEADER & THEME */
        header { text-align: center; margin: 40px 0 20px; }
        .theme-toggle {
            position: absolute; top: 0; right: 0;
            background: var(--card); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 25px; cursor: pointer; 
            font-size: 12px; font-weight: 700; box-shadow: 0 4px 10px var(--shadow);
            display: flex; align-items: center; gap: 8px;
        }

        /* ANALYTICS */
        .analytics-card {
            background: var(--card); border-radius: 28px; padding: 24px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 25px;
            border: 1px solid var(--border); box-shadow: 0 8px 20px var(--shadow);
        }
        .ring-container { position: relative; width: 70px; height: 70px; }
        svg { transform: rotate(-90deg); width: 70px; height: 70px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .circle-bg { stroke: var(--border); }
        .circle-proc { stroke: var(--gold); stroke-dasharray: 220; stroke-dashoffset: 220; }

        /* FILTERS */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 10px 20px; border-radius: 20px; background: var(--card);
            font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
            border: 1px solid var(--border); color: var(--subtext);
        }
        .filter-chip.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }

        /* CARDS */
        .card { background: var(--card); border-radius: 22px; padding: 20px; margin-bottom: 14px; border: 1px solid var(--border); box-shadow: 0 4px 12px var(--shadow); }
        .unit-card { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .unit-card:active { transform: scale(0.97); }
        .is-problem { border-left: 6px solid var(--red); }

        .action-grid { display: grid; grid-template-columns: 1fr 70px; gap: 12px; margin-top: 18px; }
        select, input { 
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 14px; color: var(--text); padding: 14px; font-size: 14px; outline: none; appearance: none;
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

        .btn-gold { background: var(--gold); border: none; border-radius: 14px; color: #000; font-weight: 800; cursor: pointer; }
        .btn-gold:hover { background: var(--gold-dark); }
        
        /* FAB & MODAL */
        .fab {
            position: fixed; bottom: 35px; right: 25px; width: 64px; height: 64px;
            background: var(--gold); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 32px; color: #000; border: none;
            box-shadow: 0 12px 24px rgba(212,175,55,0.4); z-index: 100;
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content { background: var(--card); width: 85%; max-width: 340px; padding: 30px; border-radius: 32px; border: 1px solid var(--border); animation: slideUp 0.4s ease; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }
        .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><span>🌙</span> Dark</div>

    <div id="menu-screen">
        <header>
            <h1 style="font-size: 26px; font-weight: 900; letter-spacing: -0.5px;">ATM MONITOR</h1>
            <p style="color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 4px; margin-top: 4px;">BANKALTIMTARA</p>
        </header>

        <div class="analytics-card">
            <div class="ring-container">
                <svg><circle class="circle-bg" cx="35" cy="35" r="30"></circle><circle id="progress-ring" class="circle-proc" cx="35" cy="35" r="30"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:900; font-size: 14px;" id="percent-txt">0%</div>
            </div>
            <div>
                <p style="font-size: 11px; color: var(--subtext); font-weight: 600;">OPERATIONAL HEALTH</p>
                <h3 id="summary-txt" style="font-size: 18px; margin-top: 2px;">Syncing...</h3>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterUnits('all', this)">Semua Unit</div>
            <div class="filter-chip" onclick="filterUnits('problem', this)">Unit Bermasalah</div>
        </div>

        <div id="unit-list">
            <div class="card unit-card" onclick="openUnit('Gersik', '0')" id="card-Gersik">
                <div><h3>Unit Gersik</h3><p id="sub-Gersik" style="font-size:13px; margin-top:4px;">Loading...</p></div>
                <div id="badge-Gersik" style="font-size: 20px;">􀆊</div>
            </div>
            <div class="card unit-card" onclick="openUnit('Maridan', '1565950302')" id="card-Maridan">
                <div><h3>Unit Maridan</h3><p id="sub-Maridan" style="font-size:13px; margin-top:4px;">Loading...</p></div>
                <div id="badge-Maridan" style="font-size: 20px;">􀆊</div>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--gold); font-weight:800; cursor:pointer; margin: 10px 0 20px; font-size: 14px; display:flex; align-items:center; gap:5px;">􀆉 KEMBALI</button>
        <h2 id="title-detail" style="margin-bottom:20px; font-weight: 900; font-size: 24px;">Unit Detail</h2>

        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterItems('all', this)">Semua Log</div>
            <div class="filter-chip" onclick="filterItems('issue', this)">Log Selisih ⚠️</div>
        </div>

        <div id="items-container"></div>
        <button class="fab" onclick="showModal()">+</button>
    </div>
</div>

<div id="modalAdd" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:25px; font-weight: 900; text-align: center;">Update Data</h2>
        
        <div style="display:flex; flex-direction:column; gap:15px;">
            <div>
                <label style="font-size: 11px; font-weight: 800; color: var(--subtext); margin-left: 5px;">TANGGAL</label>
                <input type="date" id="in-tgl">
            </div>
            <div>
                <label style="font-size: 11px; font-weight: 800; color: var(--subtext); margin-left: 5px;">NOMINAL SELISIH</label>
                <input type="number" id="in-selisih" placeholder="0">
            </div>
            <div>
                <label style="font-size: 11px; font-weight: 800; color: var(--subtext); margin-left: 5px;">STATUS BERJALAN</label>
                <select id="in-status">
                    <option value="PROSES">PROSES</option>
                    <option value="DONE">DONE</option>
                </select>
            </div>
        </div>

        <button class="btn-gold" style="width:100%; padding:16px; margin-top:30px; font-size: 15px;" onclick="prosesTambah()">SIMPAN PERUBAHAN</button>
        <button onclick="hideModal()" style="background:none; border:none; color:var(--subtext); width:100%; margin-top:15px; font-weight:600;">Batalkan</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "https://script.google.com/macros/s/AKfycbyvwRN3kAPzjgMmYErszuO7QGs53W7E2LxjyH81nEZrhdduFQqkRxiH6gNktGi3B9IFtQ/exec";

    let curUnit = "", curGid = "", gTotal = 0, gSafe = 0;

    window.onload = () => { 
        checkUnit('Gersik', '0'); 
        checkUnit('Maridan', '1565950302'); 
    };

    function toggleTheme() {
        const b = document.body;
        const btn = document.getElementById('themeBtn');
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        btn.innerHTML = isDark ? '<span>☀️</span> Light' : '<span>🌙</span> Dark';
    }

    async function checkUnit(nama, gid) {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            let iss = 0;
            rows.forEach(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const sel = (c[2]||"").replace(/"/g,"").trim();
                const ket = (c[3]||"").replace(/"/g,"").toUpperCase().trim();
                gTotal++; 
                if(sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE") iss++; else gSafe++;
            });
            const sub = document.getElementById('sub-'+nama);
            const card = document.getElementById('card-'+nama);
            if(iss > 0) {
                sub.innerText = iss + " Masalah Perlu Tindakan";
                sub.style.color = "var(--red)";
                card.classList.add('is-problem');
                card.setAttribute('data-state', 'problem');
            } else {
                sub.innerText = "Operasional Aman";
                sub.style.color = "var(--green)";
                card.setAttribute('data-state', 'clear');
            }
            updateRing();
        } catch(e) { console.error("Sync Error"); }
    }

    function updateRing() {
        const p = Math.round((gSafe/gTotal)*100) || 0;
        document.getElementById('progress-ring').style.strokeDashoffset = 220 - (220*p/100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p >= 90 ? "Excellent" : "Needs Review";
        document.getElementById('summary-txt').style.color = p >= 90 ? "var(--green)" : "var(--gold)";
    }

    async function openUnit(nama, gid) {
        curUnit = nama; curGid = gid;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "<p style='text-align:center; padding:50px; opacity:0.5;'>Memuat Data...</p>";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const tgl = c[1], sel = c[2], ket = c[3].toUpperCase();
            const isProblem = (sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE");

            const div = document.createElement('div');
            div.className = `card item-row ${isProblem ? 'is-problem' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p style="font-size:11px; color:var(--subtext); font-weight:700;">TANGGAL TRANSAKSI</p>
                        <b style="font-size:16px;">${tgl}</b>
                    </div>
                    <span class="status-badge" style="color:${isProblem ? 'var(--red)' : 'var(--green)'}; background:${isProblem ? 'rgba(255,69,58,0.1)' : 'rgba(50,215,75,0.1)'}">
                        ${isProblem ? 'Selisih Rp '+sel : (ket==='DONE'?'Selesai':'Aman')}
                    </span>
                </div>
                <div class="action-grid">
                    <select id="sel-${tgl}"><option value="DONE" ${ket==='DONE'?'selected':''}>DONE</option><option value="PROSES" ${ket==='PROSES'?'selected':''}>PROSES</option></select>
                    <button class="btn-gold" onclick="save('${tgl}','${nama}',this)">Update</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function filterUnits(type, el) {
        document.querySelectorAll('#menu-screen .filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.unit-card').forEach(c => {
            if(type === 'all') c.classList.remove('hidden');
            else if(c.getAttribute('data-state') === 'problem') c.classList.remove('hidden');
            else c.classList.add('hidden');
        });
    }

    function filterItems(type, el) {
        document.querySelectorAll('#detail-screen .filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.item-row').forEach(row => {
            if(type === 'all') row.classList.remove('hidden');
            else if(row.classList.contains('is-problem')) row.classList.remove('hidden');
            else row.classList.add('hidden');
        });
    }

    function showModal() { document.getElementById('modalAdd').style.display = 'flex'; }
    function hideModal() { document.getElementById('modalAdd').style.display = 'none'; }

    async function prosesTambah() {
        const rawDate = document.getElementById('in-tgl').value;
        const sel = document.getElementById('in-selisih').value || "0";
        const stat = document.getElementById('in-status').value;
        
        if(!rawDate) return alert("Pilih tanggal!");
        
        // Format YYYY-MM-DD ke DD/MM/YYYY
        const d = new Date(rawDate);
        const tgl = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;

        const btn = document.querySelector("#modalAdd .btn-gold");
        btn.innerText = "Menyimpan..."; btn.disabled = true;

        await fetch(`${WEB_URL}?action=tambah&tanggal=${encodeURIComponent(tgl)}&selisih=${sel}&status=${stat}&sheetName=${curUnit}`, {mode:'no-cors'});
        
        hideModal();
        btn.innerText = "SIMPAN PERUBAHAN"; btn.disabled = false;
        openUnit(curUnit, curGid);
    }

    async function save(tgl, unit, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        btn.innerText = "..";
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(unit)}`, {mode:'no-cors'});
        btn.innerText = "OK";
        setTimeout(() => openUnit(unit, curGid), 500);
    }
</script>
</body>
</html>
