<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor - Bankaltimtara</title>
    <style>
        :root {
            --ios-bg: #003366; 
            --glass-bg: rgba(0, 51, 102, 0.45); 
            --glass-border: rgba(255, 215, 0, 0.35); 
            --accent-yellow: #FACC15; 
            --accent-red: #FF453A;
            --accent-green: #32D74B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            min-height: 100vh; 
            background: linear-gradient(135deg, #003366 0%, #004e92 50%, #facc15 150%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; padding: 15px; color: white;
        }

        .glass-card { 
            background: var(--glass-bg); backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            padding: 24px; border-radius: 44px; border: 1px solid var(--glass-border);
            width: 100%; max-width: 420px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .banner-notif {
            background: var(--accent-red); color: white; padding: 12px; border-radius: 20px;
            margin-bottom: 20px; display: none; font-weight: 700; text-align: center; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.3); animation: slideDown 0.5s ease;
        }

        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h2 { font-weight: 800; color: var(--accent-yellow); margin-bottom: 25px; text-align: center; font-size: 26px; }

        .btn-menu { 
            width: 100%; margin-bottom: 12px; padding: 20px; 
            background: rgba(255, 255, 255, 0.12); color: white; border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 22px; font-weight: 600; font-size: 17px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }

        .notif-badge {
            background: var(--accent-red); color: white; font-size: 10px; padding: 4px 10px; 
            border-radius: 12px; font-weight: 800; animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .table-container { background: rgba(0, 0, 0, 0.2); border-radius: 24px; overflow: hidden; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(250, 204, 21, 0.2); padding: 14px; color: var(--accent-yellow); }
        td { padding: 14px; border-bottom: 0.5px solid rgba(255, 255, 255, 0.05); text-align: center; }

        .warning { background: rgba(255, 69, 58, 0.18) !important; }
        .no-selisih { color: var(--accent-green); font-weight: 600; }
        .ada-selisih { color: var(--accent-red); font-weight: 800; }
        .row-hidden { display: none !important; }

        select { background: white; color: #003366; border: none; padding: 6px; border-radius: 8px; font-weight: 700; }
        .btn-save { background: var(--accent-yellow); color: #003366; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-back { background: transparent; border: 1.5px solid var(--accent-yellow); border-radius: 20px; padding: 14px; width: 100%; color: var(--accent-yellow); font-weight: 700; cursor: pointer; margin-top: 10px; }

        .switch { position: relative; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.2); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 24px; width: 24px; left: 2px; bottom: 2px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent-yellow); }
        input:checked + .slider:before { transform: translateX(22px); background: #003366; }
    </style>
</head>
<body>

<div class="glass-card">
    <div id="notif-banner" class="banner-notif">⚠️ PERHATIAN: ADA SELISIH BELUM SELESAI</div>

    <div id="menu">
        <h2>Bankaltimtara 🏦</h2>
        <button id="btn-Gersik" class="btn-menu" onclick="muatData('Gersik', '0')">Unit Gersik <span>􀄫</span></button>
        <button id="btn-Maridan" class="btn-menu" onclick="muatData('Maridan', '1565950302')">Unit Maridan <span>􀄫</span></button>
    </div>

    <div id="detail" style="display:none;">
        <h3 id="unit-nama" style="text-align:center; margin-bottom:15px; color: var(--accent-yellow);"></h3>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:rgba(255,255,255,0.05); padding:12px; border-radius:15px;">
            <span style="font-size: 13px; font-weight:600;">Hanya Selisih & Belum Done</span>
            <label class="switch">
                <input type="checkbox" id="toggleFilter" onchange="jalankanFilter()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Tgl</th><th>Selisih</th><th>Aksi Status</th></tr></thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
        <button class="btn-back" onclick="location.reload()">KEMBALI</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";
    let sheetSekarang = "";

    window.onload = cekSelisihGlobal;

    async function cekSelisihGlobal() {
        const units = [{ n: 'Gersik', g: '0' }, { n: 'Maridan', g: '1565950302' }];
        let globalDanger = false;

        for (let u of units) {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${u.g}&t=${Date.now()}`);
                const text = await res.text();
                const lines = text.split('\n').slice(1);
                
                let unitHasUnresolved = false;
                lines.forEach(line => {
                    const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 4) {
                        const selVal = col[2].replace(/"/g, "").trim();
                        const ketVal = col[3].replace(/"/g, "").toUpperCase().trim();
                        // KRITERIA NOTIF: Ada nominal selisih DAN keterangan BUKAN "DONE"
                        if (selVal !== "-" && selVal !== "0" && selVal !== "" && ketVal !== "DONE") {
                            unitHasUnresolved = true;
                        }
                    }
                });

                if (unitHasUnresolved) {
                    globalDanger = true;
                    document.getElementById('btn-' + u.n).innerHTML = `${u.n} <span class="notif-badge">ADA SELISIH</span>`;
                }
            } catch (e) { console.error("Sync Error"); }
        }
        if (globalDanger) document.getElementById('notif-banner').style.display = 'block';
    }

    async function muatData(nama, gid) {
        sheetSekarang = nama;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('detail').style.display = 'block';
        document.getElementById('unit-nama').innerText = "Unit: " + nama;
        const tb = document.getElementById('isi-tabel');
        tb.innerHTML = "<tr><td colspan='3' style='padding:30px; opacity:0.6;'>Memuat data dari Sheets...</td></tr>";

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            tb.innerHTML = "";

            lines.forEach(line => {
                const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                if (col.length < 2) return;
                
                const tgl = col[1], sel = col[2], ket = (col[3] || "").toUpperCase();
                if (tgl && tgl !== "null") {
                    const isNoSelisih = (sel === "-" || sel === "0" || sel === "");
                    const isProblem = (!isNoSelisih && ket !== "DONE");
                    
                    tb.innerHTML += `
                        <tr class="${isProblem ? 'warning problem-row' : 'safe-row'}">
                            <td>${tgl}</td>
                            <td class="${isNoSelisih ? 'no-selisih' : 'ada-selisih'}">${isNoSelisih ? 'Aman' : 'Rp '+sel}</td>
                            <td>
                                <div style="display:flex; align-items:center; gap:5px; justify-content:center;">
                                    <select id="sel-${tgl}">
                                        <option value="" ${ket==""?'selected':''}>-</option>
                                        <option value="DONE" ${ket=="DONE"?'selected':''}>DONE</option>
                                        <option value="PROSES" ${ket=="PROSES"?'selected':''}>PROSES</option>
                                    </select>
                                    <button class="btn-save" onclick="simpanKeSheet('${tgl}')">Ok</button>
                                </div>
                            </td>
                        </tr>`;
                }
            });
        } catch (e) { tb.innerHTML = "<tr><td colspan='3'>Error memuat data</td></tr>"; }
    }

    async function simpanKeSheet(tgl) {
        const val = document.getElementById(`sel-${tgl}`).value;
        if(!val) return alert("Pilih status dulu!");
        const btn = event.target;
        btn.innerText = "..."; 
        
        const url = `${WEB_APP_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(sheetSekarang)}`;

        try {
            await fetch(url, { method: 'POST', mode: 'no-cors' });
            alert("Status berhasil diperbarui!");
            btn.innerText = "Ok";
            if(val === "DONE") location.reload(); // Refresh untuk update notifikasi
        } catch (e) { alert("Gagal menyimpan!"); btn.innerText = "Ok"; }
    }

    function jalankanFilter() {
        const cek = document.getElementById('toggleFilter').checked;
        document.querySelectorAll('.safe-row').forEach(r => r.classList.toggle('row-hidden', cek));
    }
</script>
</body>
</html>
