<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Pro - Filter Edition</title>
    <style>
        :root {
            --blue: #0A84FF; --green: #30D158; --red: #FF453A; --gray: #8E8E93;
            --bg: #000; --card: #1C1C1E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 400px; }

        /* TAB FILTER STYLE */
        .filter-tab {
            display: flex; background: #2C2C2E; padding: 4px; border-radius: 12px;
            margin-bottom: 20px; position: sticky; top: 10px; z-index: 100;
        }
        .filter-btn {
            flex: 1; border: none; background: none; color: white; padding: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .filter-btn.active { background: #636366; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* ITEM ROW */
        .item-row {
            background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .date-label { font-weight: 700; font-size: 15px; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; }

        /* DROPDOWN & BUTTON */
        .action-group { display: flex; gap: 8px; }
        select { 
            flex: 1; background: #2C2C2E; border: none; border-radius: 10px; 
            color: white; padding: 10px; font-size: 14px; outline: none; 
        }
        .btn-update { 
            background: var(--blue); border: none; padding: 0 15px; 
            border-radius: 10px; color: white; font-weight: 700; cursor: pointer; 
        }

        .hidden { display: none !important; }
        .unit-btn { 
            width: 100%; padding: 20px; background: var(--card); color: white; 
            border: 1px solid #333; border-radius: 20px; margin-bottom: 12px; 
            font-size: 17px; font-weight: 600; text-align: left; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-menu">
        <h1 style="margin: 20px 0 30px 0; font-size: 32px; font-weight: 800;">ATM Monitor</h1>
        <button class="unit-btn" onclick="bukaUnit('Gersik', '0')">Unit Gersik <span>􀆊</span></button>
        <button class="unit-btn" onclick="bukaUnit('Maridan', '1565950302')">Unit Maridan <span>􀆊</span></button>
    </div>

    <div id="screen-detail" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="location.reload()" style="background:none; border:none; color:var(--blue); font-size: 17px; font-weight: 600; cursor:pointer;">􀆉 Kembali</button>
            <h3 id="unit-title">Unit</h3>
            <div style="width: 60px;"></div>
        </div>

        <div class="filter-tab">
            <button id="btn-all" class="filter-btn active" onclick="setFilter('all')">Semua</button>
            <button id="btn-selisih" class="filter-btn" onclick="setFilter('selisih')">Ada Selisih</button>
        </div>

        <div id="list-data"></div>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const APPS_SCRIPT_URL = "ISI_DENGAN_URL_DEPLOYMENT_BARU_KAMU"; // Pastikan ganti ini!

    let currentFilter = 'all';

    async function bukaUnit(nama, gid) {
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-detail').classList.remove('hidden');
        document.getElementById('unit-title').innerText = nama;
        
        const container = document.getElementById('list-data');
        container.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:20px;'>Mengambil data...</p>";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;

            const tgl = c[1], sel = c[2], ket = (c[3]||"").toUpperCase();
            const noDiff = (sel === "" || sel === "0" || sel === "-");
            const isDone = (ket === "DONE");
            
            // Penentu apakah baris ini masuk kategori "masalah"
            const isProblem = (!noDiff && !isDone);

            const div = document.createElement('div');
            div.className = `item-row ${isProblem ? 'is-problem' : 'is-clear'}`;
            
            // Logika Warna Badge
            let bColor = "rgba(48, 209, 88, 0.2)", tColor = "var(--green)", txt = "✓ AMAN";
            if(isProblem) { bColor = "rgba(255, 69, 58, 0.2)"; tColor = "var(--red)"; txt = "Rp " + sel; }
            if(isDone && !noDiff) { bColor = "rgba(142, 142, 147, 0.2)"; tColor = "var(--gray)"; txt = "DONE"; }

            div.innerHTML = `
                <div class="row-top">
                    <span class="date-label">${tgl}</span>
                    <span class="badge" style="background:${bColor}; color:${tColor};">${txt}</span>
                </div>
                <div class="action-group">
                    <select id="sel-${tgl}">
                        <option value="" ${ket==""?'selected':''}>Set Status</option>
                        <option value="DONE" ${isDone?'selected':''}>DONE</option>
                        <option value="PROSES" ${ket=="PROSES"?'selected':''}>PROSES</option>
                    </select>
                    <button class="btn-update" onclick="update('${tgl}','${nama}',this)">Ok</button>
                </div>
            `;
            container.appendChild(div);
        });
        
        applyFilter();
    }

    function setFilter(type) {
        currentFilter = type;
        document.getElementById('btn-all').classList.toggle('active', type === 'all');
        document.getElementById('btn-selisih').classList.toggle('active', type === 'selisih');
        applyFilter();
    }

    function applyFilter() {
        const items = document.querySelectorAll('.item-row');
        items.forEach(el => {
            if (currentFilter === 'all') {
                el.classList.remove('hidden');
            } else {
                // Jika pilih filter "selisih", sembunyikan yang sudah clear/aman
                if (el.classList.contains('is-problem')) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            }
        });
    }

    async function update(tgl, unit, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        if(!val) return;
        btn.innerText = "..";
        // Kirim data ke Google Apps Script
        await fetch(`${APPS_SCRIPT_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(unit)}`, {mode:'no-cors'});
        btn.innerText = "✓";
        setTimeout(() => bukaUnit(unit, unit==='Gersik'?'0':'1565950302'), 500);
    }
</script>
</body>
</html>
