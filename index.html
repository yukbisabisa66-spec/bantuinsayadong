<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATM Monitor</title>
    <style>
        :root {
            --ios-accent: #D4AF37;
            --ios-blue: #007AFF;
            --ios-red: #FF453A;
            --ios-green: #32D74B;
            --ios-gray: #8E8E93;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Dynamic Mesh Background (Efek Wallpaper iPhone) */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(at 0% 0%, #1a1a1a 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #2c2c2e 0%, transparent 50%),
                        radial-gradient(at 50% 100%, #000 0%, transparent 50%);
            z-index: -1;
            filter: blur(40px);
            animation: meshMove 20s ease infinite alternate;
        }

        @keyframes meshMove {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .app-container { width: 100%; max-width: 430px; margin: 0 auto; padding: 0 20px 120px 20px; }

        /* iOS Large Title */
        .header-section { padding-top: 80px; margin-bottom: 30px; }
        .header-section p { font-size: 13px; font-weight: 600; color: var(--ios-accent); text-transform: uppercase; letter-spacing: 1px; }
        .header-section h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; }

        /* Widget Kinerja */
        .widget {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 28px; padding: 24px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 20px; margin-bottom: 30px;
        }

        .ring-box { position: relative; width: 64px; height: 64px; }
        svg { transform: rotate(-90deg); width: 64px; height: 64px; }
        circle { fill: none; stroke-width: 7; stroke-linecap: round; }
        .c-bg { stroke: rgba(255,255,255,0.1); }
        .c-proc { stroke: var(--ios-accent); stroke-dasharray: 201; stroke-dashoffset: 201; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Segmented Control (Filter) */
        .segmented-control {
            background: rgba(118, 118, 128, 0.24);
            border-radius: 10px; padding: 2px; display: flex; margin-bottom: 25px;
        }
        .segment {
            flex: 1; padding: 7px 0; border-radius: 8px; font-size: 13px; font-weight: 500;
            text-align: center; color: #fff; cursor: pointer; transition: 0.2s;
        }
        .segment.active { background: #636366; box-shadow: 0 3px 8px rgba(0,0,0,0.12); }

        /* Grouped List Style */
        .list-label { font-size: 13px; color: var(--ios-gray); margin: 0 0 8px 16px; text-transform: uppercase; }
        .ios-group {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px; overflow: hidden; border: 0.5px solid var(--glass-border);
        }

        .ios-cell {
            padding: 16px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 0.5px solid var(--glass-border); cursor: pointer;
        }
        .ios-cell:active { background: rgba(255, 255, 255, 0.1); }
        .ios-cell:last-child { border-bottom: none; }
        .ios-cell h3 { font-size: 17px; font-weight: 500; }
        .chevron { color: #555; font-size: 16px; }

        /* Tab Bar */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 88px;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); border-top: 0.5px solid var(--glass-border);
            display: flex; justify-content: space-around; padding-top: 10px;
        }
        .tab-item { text-align: center; color: var(--ios-gray); text-decoration: none; width: 25%; }
        .tab-item.active { color: var(--ios-accent); }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 3px; }
        .tab-label { font-size: 10px; font-weight: 500; }

        /* Detail Screen Slide */
        #screen-detail {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px;
            overflow-y: auto;
        }
        #screen-detail.active { transform: translateX(0); }

        .back-btn { color: var(--ios-blue); font-size: 17px; background: none; border: none; cursor: pointer; display: flex; align-items: center; margin-bottom: 20px; }

        .log-item {
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 12px;
            border-left: 4px solid var(--ios-green);
        }
        .log-item.error { border-left-color: var(--ios-red); }

        .fab {
            position: fixed; bottom: 105px; right: 20px; width: 56px; height: 56px;
            background: var(--ios-accent); border-radius: 50%; border: none;
            font-size: 30px; color: #000; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 150;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="mesh-bg"></div>

<div class="app-container" id="main-view">
    <div class="header-section">
        <p>Laporan Bankaltimtara</p>
        <h1>ATM Monitor</h1>
    </div>

    <div class="widget">
        <div class="ring-box">
            <svg><circle class="c-bg" cx="32" cy="32" r="30"></circle><circle id="progress-ring" class="c-proc" cx="32" cy="32" r="30"></circle></svg>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:700; font-size:14px;" id="percent-txt">0%</div>
        </div>
        <div>
            <h3 id="summary-txt" style="font-size: 19px; letter-spacing: -0.5px;">Memuat Data...</h3>
            <p style="font-size: 13px; color: var(--ios-gray);">KCP Operasional Aman</p>
        </div>
    </div>

    <div class="segmented-control">
        <div class="segment active" onclick="filterList('all', this)">Semua KCP</div>
        <div class="segment" onclick="filterList('problem', this)">Masalah</div>
    </div>

    <p class="list-label">Lokasi KCP</p>
    <div class="ios-group" id="unit-list">
        <div class="ios-cell" onclick="openDetail('Gersik', '0')" id="cell-Gersik">
            <div><h3 style="color: #fff;">KCP Gersik</h3><p id="st-Gersik" style="font-size: 14px; color: var(--ios-gray);">Checking...</p></div>
            <span class="chevron">❯</span>
        </div>
        <div class="ios-cell" onclick="openDetail('Maridan', '1565950302')" id="cell-Maridan">
            <div><h3 style="color: #fff;">KCP Maridan</h3><p id="st-Maridan" style="font-size: 14px; color: var(--ios-gray);">Checking...</p></div>
            <span class="chevron">❯</span>
        </div>
    </div>
</div>

<div id="screen-detail">
    <div class="mesh-bg"></div>
    <button class="back-btn" onclick="closeDetail()">❮ ATM Monitor</button>
    <h1 id="detail-title" style="font-size: 32px; margin-bottom: 25px;">Detail</h1>
    <div id="detail-content"></div>
</div>

<div class="tab-bar">
    <a href="#" class="tab-item active"><span class="tab-icon">􀊫</span><span class="tab-label">Monitoring</span></a>
    <a href="#" class="tab-item"><span class="tab-icon">􀍟</span><span class="tab-label">Riwayat</span></a>
    <a href="#" class="tab-item"><span class="tab-icon">􀣋</span><span class="tab-label">Laporan</span></a>
    <a href="#" class="tab-item"><span class="tab-icon">􀍢</span><span class="tab-label">Pengaturan</span></a>
</div>

<button class="fab" onclick="alert('Fungsi Input Data Baru')">+</button>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    
    window.onload = () => { 
        checkKCP('Gersik', '0'); 
        checkKCP('Maridan', '1565950302'); 
    };

    async function checkKCP(nama, gid) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        let error = 0;
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(c[2] && c[2].replace(/"/g,"").trim() !== "0" && c[3].replace(/"/g,"").trim().toUpperCase() !== "DONE") error++;
        });
        const el = document.getElementById('st-'+nama);
        el.innerText = error > 0 ? error + " Masalah" : "Aman";
        el.style.color = error > 0 ? "var(--ios-red)" : "var(--ios-green)";
        if(error > 0) document.getElementById('cell-'+nama).setAttribute('data-problem', 'true');
        updateProgress(error);
    }

    function updateProgress(err) {
        // Logika persentase simulasi
        const p = err > 0 ? 85 : 100;
        document.getElementById('progress-ring').style.strokeDashoffset = 201 - (201 * p / 100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p === 100 ? "Semua Aman" : "Perlu Tindakan";
    }

    function openDetail(nama, gid) {
        document.getElementById('detail-title').innerText = "KCP " + nama;
        document.getElementById('screen-detail').classList.add('active');
        // Fetch detail logic here...
    }

    function closeDetail() {
        document.getElementById('screen-detail').classList.remove('active');
    }

    function filterList(type, el) {
        document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.ios-cell').forEach(cell => {
            if(type === 'all') cell.style.display = 'flex';
            else cell.style.display = cell.getAttribute('data-problem') ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
