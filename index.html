<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATM Monitor KCP</title>
    <style>
        :root {
            /* Default: Dark Gold iOS */
            --bg-gradient: linear-gradient(135deg, #000000, #1c1c1e, #2c2c2e);
            --card-bg: rgba(28, 28, 30, 0.7);
            --glass: blur(20px) saturate(180%);
            --text: #FFFFFF; --subtext: #8E8E93;
            --accent: #D4AF37; --border: rgba(255, 255, 255, 0.1);
            --red: #FF453A; --green: #32D74B;
        }

        [data-theme="blue"] {
            --bg-gradient: linear-gradient(135deg, #001220, #002d4d, #004d80);
            --accent: #0A84FF; --card-bg: rgba(10, 30, 50, 0.6);
        }

        [data-theme="emerald"] {
            --bg-gradient: linear-gradient(135deg, #011305, #0a2b12, #144d21);
            --accent: #30D158; --card-bg: rgba(15, 40, 20, 0.6);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #F2F2F7, #E5E5EA, #D1D1D6);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text: #000000; --subtext: #636366;
            --border: rgba(0, 0, 0, 0.1); --glass: blur(25px) saturate(200%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background: var(--bg-gradient); 
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
            color: var(--text); 
            min-height: 100vh;
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container { width: 100%; max-width: 430px; padding: 20px; padding-top: 60px; }

        /* Theme Switcher iOS Style */
        .theme-hub { 
            display: flex; gap: 12px; margin-bottom: 30px; 
            padding: 10px; background: var(--card-bg); 
            backdrop-filter: var(--glass); border-radius: 20px;
            justify-content: center; border: 1px solid var(--border);
        }
        .dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); }

        header h1 { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        header p { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px;}

        /* Card iOS Style */
        .ios-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .analytics { display: flex; align-items: center; gap: 20px; }
        .ring { position: relative; width: 65px; height: 65px; }
        svg { transform: rotate(-90deg); width: 65px; height: 65px; }
        circle { fill: none; stroke-width: 7; stroke-linecap: round; }
        .c-bg { stroke: var(--border); }
        .c-proc { stroke: var(--accent); stroke-dasharray: 200; stroke-dashoffset: 200; transition: 1.5s ease-out; }

        /* KCP List */
        .kcp-item { 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; active: scale(0.97); 
        }
        .kcp-item h3 { font-size: 19px; font-weight: 700; }
        .arrow { font-size: 18px; opacity: 0.3; }

        /* Filter Chips */
        .filter-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .chip { 
            padding: 8px 16px; border-radius: 12px; 
            background: var(--card-bg); backdrop-filter: var(--glass);
            font-size: 13px; font-weight: 600; color: var(--subtext);
            border: 1px solid var(--border); cursor: pointer;
        }
        .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Detail Items */
        .status-pill { 
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800;
            text-transform: uppercase;
        }

        .fab {
            position: fixed; bottom: 40px; right: 30px;
            width: 60px; height: 60px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); color: #000; font-size: 30px; border: none;
        }

        .hidden { display: none !important; }
        
        select, input {
            width: 100%; padding: 15px; border-radius: 14px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text); font-size: 15px; outline: none; margin-top: 10px;
        }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <div class="theme-hub">
        <div class="dot" style="background: #D4AF37;" onclick="setTheme('dark')"></div>
        <div class="dot" style="background: #0A84FF;" onclick="setTheme('blue')"></div>
        <div class="dot" style="background: #30D158;" onclick="setTheme('emerald')"></div>
        <div class="dot" style="background: #FFFFFF;" onclick="setTheme('light')"></div>
    </div>

    <div id="screen-main">
        <header>
            <p>Bankaltimtara</p>
            <h1>ATM Monitor</h1>
        </header>

        <div class="ios-card analytics">
            <div class="ring">
                <svg><circle class="c-bg" cx="32.5" cy="32.5" r="28"></circle><circle id="progress-ring" class="c-proc" cx="32.5" cy="32.5" r="28"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:800; font-size:14px;" id="percent-txt">0%</div>
            </div>
            <div>
                <p style="font-size: 12px; color: var(--subtext); font-weight: 600;">OPERASIONAL KCP</p>
                <h2 id="summary-txt">Syncing...</h2>
            </div>
        </div>

        <div class="filter-group">
            <div class="chip active" onclick="filterUnits('all', this)">Semua</div>
            <div class="chip" onclick="filterUnits('problem', this)">Masalah ⚠</div>
        </div>

        <div id="kcp-list">
            <div class="ios-card kcp-item" onclick="openUnit('Gersik', '0')" id="card-Gersik">
                <div><h3 id="name-Gersik">KCP Gersik</h3><p id="sub-Gersik" style="font-size:13px; color:var(--subtext);">Loading...</p></div>
                <div class="arrow">❯</div>
            </div>
            <div class="ios-card kcp-item" onclick="openUnit('Maridan', '1565950302')" id="card-Maridan">
                <div><h3 id="name-Maridan">KCP Maridan</h3><p id="sub-Maridan" style="font-size:13px; color:var(--subtext);">Loading...</p></div>
                <div class="arrow">❯</div>
            </div>
        </div>
    </div>

    <div id="screen-detail" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--accent); font-weight:700; cursor:pointer; margin-bottom:20px; font-size:16px;">❮ KCP List</button>
        <h1 id="title-detail" style="margin-bottom:25px;">Detail</h1>
        
        <div id="items-container"></div>
        <button class="fab" onclick="showModal()">+</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "URL_APPS_SCRIPT_ANDA"; // GANTI DENGAN URL DEPLOY ANDA

    let curUnit = "", curGid = "", gTotal = 0, gSafe = 0;

    function setTheme(t) {
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('kcpTheme', t);
    }

    window.onload = () => {
        const saved = localStorage.getItem('kcpTheme') || 'dark';
        setTheme(saved);
        checkUnit('Gersik', '0'); 
        checkUnit('Maridan', '1565950302');
    };

    // Fungsi Logika Penarikan & Filter Data
    async function checkUnit(nama, gid) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        let iss = 0;
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const sel = (c[2] || "").trim();
            const ket = (c[3] || "").toUpperCase().trim();
            gTotal++;
            if (sel !== "0" && sel !== "-" && sel !== "" && ket !== "DONE") iss++; else gSafe++;
        });
        document.getElementById('sub-'+nama).innerText = iss > 0 ? iss + " Masalah Ditemukan" : "Operasional Normal";
        document.getElementById('sub-'+nama).style.color = iss > 0 ? "var(--red)" : "var(--green)";
        if(iss > 0) document.getElementById('card-'+nama).classList.add('is-problem');
        updateRing();
    }

    function updateRing() {
        const p = Math.round((gSafe/gTotal)*100) || 0;
        document.getElementById('progress-ring').style.strokeDashoffset = 200 - (200*p/100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p >= 90 ? "Excellent" : "Monitoring";
    }

    async function openUnit(nama, gid) {
        curUnit = nama; curGid = gid;
        document.getElementById('screen-main').classList.add('hidden');
        document.getElementById('screen-detail').classList.remove('hidden');
        document.getElementById('title-detail').innerText = "KCP " + nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "<p style='text-align:center; padding:50px; opacity:0.5;'>Memuat data...</p>";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^original text ... ]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const tgl = c[1];
            const nominal = (c[2] || "").trim();
            const ket = (c[3] || "").toUpperCase().trim();
            const isProblem = (nominal !== "0" && nominal !== "-" && nominal !== "" && ket !== "DONE");

            const div = document.createElement('div');
            div.className = `ios-card`;
            div.style.borderLeft = isProblem ? "6px solid var(--red)" : "6px solid var(--green)";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:17px;">${tgl}</b></div>
                    <div class="status-pill" style="background:${isProblem?'rgba(255,69,58,0.1)':'rgba(48,209,88,0.1)'}; color:${isProblem?'var(--red)':'var(--green)'}">
                        ${isProblem ? 'SELISIH' : 'AMAN'}
                    </div>
                </div>
                ${isProblem ? `<p style="margin:10px 0; font-weight:700; font-size:20px; color:var(--red)">Rp ${nominal}</p>` : ''}
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <select id="sel-${tgl}" style="margin:0;"><option value="PROSES" ${ket==='PROSES'?'selected':''}>PROSES</option><option value="DONE" ${ket==='DONE'?'selected':''}>DONE</option></select>
                    <button onclick="save('${tgl}', this)" style="background:var(--accent); border:none; padding:10px 20px; border-radius:12px; font-weight:700; color:#000;">Update</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function save(tgl, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        btn.innerText = "..";
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(curUnit)}`, {mode:'no-cors'});
        btn.innerText = "✓";
        setTimeout(() => openUnit(curUnit, curGid), 800);
    }

    function filterUnits(t, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.kcp-item').forEach(c => {
            if(t === 'all') c.classList.remove('hidden');
            else c.classList.toggle('hidden', !c.classList.contains('is-problem'));
        });
    }
</script>
</body>
</html>
