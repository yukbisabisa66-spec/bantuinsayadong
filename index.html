<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Supreme V11</title>
    <style>
        :root {
            --gold: #D4AF37; --bg: #0A0A0B; --card: #1C1C1E;
            --text: #FFFFFF; --subtext: #8E8E93;
            --border: rgba(255, 255, 255, 0.08);
            --red: #FF453A; --green: #32D74B;
        }
        [data-theme="light"] {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #000000; --subtext: #636366;
            --border: rgba(0, 0, 0, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; position: relative; }
        
        /* THEME & HEADER */
        .theme-toggle { position: absolute; top: 0; right: 0; background: var(--card); border: 1px solid var(--border); padding: 10px 18px; border-radius: 25px; cursor: pointer; font-size: 12px; font-weight: 700; }
        header { text-align: center; margin: 40px 0 20px; }

        /* RING ANALYTICS */
        .analytics-card { background: var(--card); border-radius: 28px; padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border: 1px solid var(--border); }
        .ring-container { position: relative; width: 70px; height: 70px; }
        svg { transform: rotate(-90deg); width: 70px; height: 70px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .circle-bg { stroke: var(--border); }
        .circle-proc { stroke: var(--gold); stroke-dasharray: 220; stroke-dashoffset: 220; }

        /* FILTER CHIPS */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px 0; }
        .filter-chip { padding: 10px 20px; border-radius: 20px; background: var(--card); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); color: var(--subtext); }
        .filter-chip.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* CARDS */
        .card { background: var(--card); border-radius: 22px; padding: 20px; margin-bottom: 14px; border: 1px solid var(--border); position: relative; }
        .unit-card { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .is-problem { border-left: 6px solid var(--red); }

        .action-grid { display: grid; grid-template-columns: 1fr 80px; gap: 12px; margin-top: 18px; }
        select, input { background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; color: var(--text); padding: 14px; font-size: 14px; outline: none; width: 100%; }

        .btn-gold { background: var(--gold); border: none; border-radius: 14px; color: #000; font-weight: 800; cursor: pointer; }
        .status-badge { padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; }

        /* MODAL & FAB */
        .fab { position: fixed; bottom: 35px; right: 25px; width: 64px; height: 64px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #000; border: none; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: var(--card); width: 85%; padding: 30px; border-radius: 32px; }
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark</div>

    <div id="menu-screen">
        <header>
            <h1 style="font-size: 26px; font-weight: 900;">ATM MONITOR</h1>
            <p style="color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 4px;">BANKALTIMTARA</p>
        </header>

        <div class="analytics-card">
            <div class="ring-container">
                <svg><circle class="circle-bg" cx="35" cy="35" r="30"></circle><circle id="progress-ring" class="circle-proc" cx="35" cy="35" r="30"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:900;" id="percent-txt">0%</div>
            </div>
            <div>
                <p style="font-size: 11px; color: var(--subtext);">HEALTH STATUS</p>
                <h3 id="summary-txt">Syncing...</h3>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterUnits('all', this)">Semua Unit</div>
            <div class="filter-chip" onclick="filterUnits('problem', this)">Masalah</div>
        </div>

        <div id="unit-list">
            <div class="card unit-card" onclick="openUnit('Gersik', '0')" id="card-Gersik">
                <div><h3>Unit Gersik</h3><p id="sub-Gersik" style="font-size:13px; opacity:0.6;">Loading...</p></div>
                <div>􀆊</div>
            </div>
            <div class="card unit-card" onclick="openUnit('Maridan', '1565950302')" id="card-Maridan">
                <div><h3>Unit Maridan</h3><p id="sub-Maridan" style="font-size:13px; opacity:0.6;">Loading...</p></div>
                <div>􀆊</div>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--gold); font-weight:800; cursor:pointer; margin-bottom:20px;">← KEMBALI</button>
        <h2 id="title-detail" style="margin-bottom:20px; font-size: 24px;">Detail</h2>
        
        <div class="filter-bar">
            <div class="filter-chip active" onclick="filterItems('all', this)">Semua Log</div>
            <div class="filter-chip" onclick="filterItems('issue', this)">Hanya Selisih</div>
        </div>

        <div id="items-container"></div>
        <button class="fab" onclick="showModal()">+</button>
    </div>
</div>

<div id="modalAdd" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px; text-align: center;">Input Data Baru</h2>
        <input type="date" id="in-tgl" style="margin-bottom: 15px;">
        <input type="number" id="in-selisih" placeholder="Jumlah Selisih (0 jika OK)" style="margin-bottom: 15px;">
        <select id="in-status">
            <option value="PROSES">PROSES</option>
            <option value="DONE">DONE</option>
        </select>
        <button class="btn-gold" style="width:100%; padding:16px; margin-top:25px;" onclick="prosesTambah()">SIMPAN DATA</button>
        <button onclick="hideModal()" style="background:none; border:none; color:var(--subtext); width:100%; margin-top:15px;">Batal</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "https://script.google.com/macros/s/AKfycbwchhD6mJ5B3zvhjKvCiqjtoFlkJQUL6uziO--mhK04V5NKmfVsqDaxigHj39YZwosvCw/exec"; // GANTI DENGAN URL DEPLOYMENT BARU

    let curUnit = "", curGid = "", gTotal = 0, gSafe = 0;

    // FORMAT TANGGAL: 23/04/2026 -> 23 APRIL 2026
    function formatTglIndo(tglStr) {
        const bln = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
        const p = tglStr.split('/');
        if(p.length < 3) return tglStr;
        return `${p[0]} ${bln[parseInt(p[1]) - 1]} ${p[2]}`;
    }

    // FORMAT RUPIAH: 500000 -> Rp 500.000
    function formatRp(n) {
        const num = parseInt(n.toString().replace(/[^0-9]/g, '')) || 0;
        return "Rp " + num.toLocaleString('id-ID');
    }

    window.onload = () => { checkUnit('Gersik', '0'); checkUnit('Maridan', '1565950302'); };

    async function checkUnit(nama, gid) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        let iss = 0;
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            const sel = c[2], ket = (c[3]||"").toUpperCase();
            gTotal++; if(sel !== "0" && sel !== "-" && ket !== "DONE") iss++; else gSafe++;
        });
        document.getElementById('sub-'+nama).innerText = iss > 0 ? iss + " Masalah" : "Operasional Aman";
        document.getElementById('sub-'+nama).style.color = iss > 0 ? "var(--red)" : "var(--green)";
        if(iss > 0) document.getElementById('card-'+nama).setAttribute('data-state', 'problem');
        updateRing();
    }

    function updateRing() {
        const p = Math.round((gSafe/gTotal)*100) || 0;
        document.getElementById('progress-ring').style.strokeDashoffset = 220 - (220*p/100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p >= 90 ? "Excellent" : "Needs Review";
    }

    async function openUnit(nama, gid) {
        curUnit = nama; curGid = gid;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "Syncing...";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const tglOriginal = c[1], nominal = c[2], ket = c[3].toUpperCase();
            const isProblem = (nominal !== "0" && nominal !== "-" && ket !== "DONE");

            const div = document.createElement('div');
            div.className = `card item-row ${isProblem ? 'is-problem' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div><p style="font-size:10px; color:var(--subtext);">TANGGAL TRANSAKSI</p><b>${formatTglIndo(tglOriginal)}</b></div>
                    <span class="status-badge" style="color:${isProblem ? 'var(--red)' : 'var(--green)'}; background:${isProblem ? 'rgba(255,69,58,0.1)' : 'rgba(50,215,75,0.1)'}">
                        ${isProblem ? 'SELISIH ' + formatRp(nominal) : (ket==='DONE'?'DONE':'AMAN')}
                    </span>
                </div>
                <div class="action-grid">
                    <select id="sel-${tglOriginal}"><option value="PROSES" ${ket==='PROSES'?'selected':''}>PROSES</option><option value="DONE" ${ket==='DONE'?'selected':''}>DONE</option></select>
                    <button class="btn-gold" onclick="save('${tglOriginal}', this)">Update</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function save(tgl, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        btn.innerText = ".."; btn.disabled = true;
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(curUnit)}`, {mode:'no-cors'});
        btn.innerText = "✓";
        setTimeout(() => openUnit(curUnit, curGid), 800);
    }

    async function prosesTambah() {
        const rawDate = document.getElementById('in-tgl').value;
        const sel = document.getElementById('in-selisih').value || "0";
        const stat = document.getElementById('in-status').value;
        if(!rawDate) return alert("Pilih tanggal!");
        const d = new Date(rawDate);
        const tgl = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        
        const btn = document.querySelector("#modalAdd .btn-gold");
        btn.innerText = "Saving...";
        await fetch(`${WEB_URL}?action=tambah&tanggal=${encodeURIComponent(tgl)}&selisih=${sel}&status=${stat}&sheetName=${curUnit}`, {mode:'no-cors'});
        hideModal(); openUnit(curUnit, curGid);
    }

    function toggleTheme() {
        const b = document.body;
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerText = isDark ? '☀️ Light' : '🌙 Dark';
    }

    function filterUnits(t, el) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); el.classList.add('active');
        document.querySelectorAll('.unit-card').forEach(c => {
            if(t === 'all') c.classList.remove('hidden');
            else c.classList.toggle('hidden', c.getAttribute('data-state') !== 'problem');
        });
    }

    function filterItems(t, el) {
        document.querySelectorAll('#detail-screen .filter-chip').forEach(c => c.classList.remove('active')); el.classList.add('active');
        document.querySelectorAll('.item-row').forEach(row => {
            if(t === 'all') row.classList.remove('hidden');
            else row.classList.toggle('hidden', !row.classList.contains('is-problem'));
        });
    }

    function showModal() { document.getElementById('modalAdd').style.display = 'flex'; }
    function hideModal() { document.getElementById('modalAdd').style.display = 'none'; }
</script>
</body>
</html>
