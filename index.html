<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Premium</title>
    <style>
        :root {
            --gold: #D4AF37; --bg: #0A0A0B; --card: rgba(28, 28, 30, 0.7);
            --text: #FFFFFF; --subtext: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
            --red: #FF453A; --green: #32D74B;
        }

        [data-theme="light"] {
            --bg: #F2F2F7; --card: rgba(255, 255, 255, 0.8); --text: #000000; --subtext: #636366;
            --border: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: 0.3s; }

        /* --- ANIMATED BACKGROUND --- */
        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Elemen Background Bergerak */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0a0a0b, #1a1a1c, #0a0a0b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        .blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(50%, 50%); }
        }

        /* --- STYLING KOMPONEN --- */
        .app-container { width: 100%; max-width: 400px; position: relative; z-index: 1; }
        
        .card { 
            background: var(--card); 
            backdrop-filter: blur(15px); /* Efek Kaca */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 14px; 
            border: 1px solid var(--border); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .theme-toggle { 
            position: absolute; top: 0; right: 0; 
            background: var(--card); border: 1px solid var(--border); 
            padding: 10px 18px; border-radius: 25px; cursor: pointer; 
            font-size: 12px; font-weight: 700; backdrop-filter: blur(10px);
        }

        header { text-align: center; margin: 40px 0 20px; }

        .analytics-card { 
            display: flex; align-items: center; gap: 20px; 
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(28,28,30,0.8));
        }

        .ring-container { position: relative; width: 70px; height: 70px; }
        svg { transform: rotate(-90deg); width: 70px; height: 70px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.05); }
        .circle-proc { stroke: var(--gold); stroke-dasharray: 220; stroke-dashoffset: 220; filter: drop-shadow(0 0 5px var(--gold)); }

        .filter-chip { 
            padding: 10px 20px; border-radius: 20px; background: var(--card); 
            font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; 
            border: 1px solid var(--border); color: var(--subtext);
        }
        .filter-chip.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.4); }

        .unit-card { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .is-problem { border-left: 6px solid var(--red) !important; background: rgba(255, 69, 58, 0.05); }

        .btn-gold { 
            background: var(--gold); border: none; border-radius: 14px; 
            color: #000; font-weight: 800; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }
        .btn-gold:active { transform: scale(0.95); }

        .fab { 
            position: fixed; bottom: 35px; right: 25px; width: 64px; height: 64px; 
            background: var(--gold); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 32px; 
            color: #000; border: none; z-index: 100; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); cursor: pointer; 
        }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px); display: none; justify-content: center; 
            align-items: center; z-index: 200; 
        }

        .hidden { display: none !important; }
        select, input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; color: var(--text); padding: 14px; margin-bottom:12px; width: 100%; }
    </style>
</head>
<body data-theme="dark">

<div class="bg-animate"></div>
<div class="blob"></div>

<div class="app-container">
    <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark</div>

    <div id="menu-screen">
        <header>
            <h1 style="font-size: 26px; font-weight: 900; letter-spacing: -1px;">ATM MONITOR</h1>
            <p style="color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 4px; opacity: 0.8;">BANKALTIMTARA</p>
        </header>

        <div class="card analytics-card">
            <div class="ring-container">
                <svg><circle class="circle-bg" cx="35" cy="35" r="30"></circle><circle id="progress-ring" class="circle-proc" cx="35" cy="35" r="30"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:900;" id="percent-txt">0%</div>
            </div>
            <div>
                <p style="font-size: 11px; color: var(--subtext); letter-spacing: 1px;">SLA OPERASIONAL</p>
                <h3 id="summary-txt" style="font-size: 20px;">Menghitung...</h3>
            </div>
        </div>

        <div class="filter-bar" style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px 0;">
            <div class="filter-chip active" onclick="filterUnits('all', this)">Semua KCP</div>
            <div class="filter-chip" onclick="filterUnits('problem', this)">Masalah</div>
        </div>

        <div id="unit-list">
            <div class="card unit-card" onclick="openUnit('Gersik', '0')" id="card-Gersik">
                <div><h3>KCP Gersik</h3><p id="sub-Gersik" style="font-size:13px; opacity:0.6;">Loading...</p></div>
                <div style="color:var(--gold)">❯</div>
            </div>
            <div class="card unit-card" onclick="openUnit('Maridan', '1565950302')" id="card-Maridan">
                <div><h3>KCP Maridan</h3><p id="sub-Maridan" style="font-size:13px; opacity:0.6;">Loading...</p></div>
                <div style="color:var(--gold)">❯</div>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--gold); font-weight:800; cursor:pointer; margin-bottom:20px;">❮ KEMBALI</button>
        <h2 id="title-detail" style="margin-bottom:20px; font-size: 24px;">Detail KCP</h2>
        <div id="items-container"></div>
        <button class="fab" onclick="showModal()">+</button>
    </div>
</div>

<div id="modalAdd" class="modal">
    <div class="modal-content card" style="width: 85%; max-width: 340px;">
        <h2 style="margin-bottom:20px; text-align: center;">Input Data</h2>
        <input type="date" id="in-tgl">
        <input type="number" id="in-selisih" placeholder="Jumlah Selisih">
        <select id="in-status">
            <option value="PROSES">PROSES</option>
            <option value="DONE">DONE</option>
        </select>
        <button class="btn-gold" style="width:100%; padding:16px; margin-top:10px;" onclick="prosesTambah()">SIMPAN DATA</button>
        <button onclick="hideModal()" style="background:none; border:none; color:var(--subtext); width:100%; margin-top:15px; cursor:pointer;">Batal</button>
    </div>
</div>

<script>
    // Konfigurasi tetap sama agar fungsi tidak rusak
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "URL_DEPLOY_ANDA"; 

    let curUnit = "", curGid = "", gTotal = 0, gSafe = 0;

    window.onload = () => { checkUnit('Gersik', '0'); checkUnit('Maridan', '1565950302'); };

    async function checkUnit(nama, gid) {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            let iss = 0;
            rows.forEach(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
                if (!c[1]) return;
                gTotal++;
                const sel = (c[2] || "").trim();
                const ket = (c[3] || "").toUpperCase().trim();
                if (sel !== "0" && sel !== "-" && sel !== "" && ket !== "DONE") iss++; else gSafe++;
            });
            document.getElementById('sub-'+nama).innerText = iss > 0 ? iss + " Masalah" : "Operasional Aman";
            document.getElementById('sub-'+nama).style.color = iss > 0 ? "var(--red)" : "var(--green)";
            if(iss > 0) document.getElementById('card-'+nama).setAttribute('data-state', 'problem');
            updateRing();
        } catch(e) { console.error("Error loading "+nama); }
    }

    function updateRing() {
        const p = Math.round((gSafe/gTotal)*100) || 0;
        const ring = document.getElementById('progress-ring');
        if (ring) ring.style.strokeDashoffset = 220 - (220*p/100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p >= 90 ? "Kinerja Baik" : "Butuh Tindakan";
    }

    async function openUnit(nama, gid) {
        curUnit = nama; curGid = gid;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = "KCP " + nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "<p style='text-align:center; padding:20px; opacity:0.5;'>Memanggil data...</p>";

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            container.innerHTML = "";

            rows.forEach(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
                if(!c[1]) return;
                const isProblem = (c[2] !== "0" && c[2] !== "-" && c[2] !== "" && c[3].toUpperCase() !== "DONE");
                const div = document.createElement('div');
                div.className = `card ${isProblem ? 'is-problem' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div><p style="font-size:10px; color:var(--subtext); font-weight:700;">TANGGAL</p><b>${c[1]}</b></div>
                        <span style="color:${isProblem ? 'var(--red)' : 'var(--green)'}; font-weight:800; font-size:12px;">
                            ${isProblem ? 'SELISIH Rp '+c[2] : 'AMAN'}
                        </span>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 80px; gap:10px; margin-top:15px;">
                        <select id="sel-${c[1]}" style="margin-bottom:0;"><option value="PROSES" ${c[3]==='PROSES'?'selected':''}>PROSES</option><option value="DONE" ${c[3]==='DONE'?'selected':''}>DONE</option></select>
                        <button class="btn-gold" onclick="save('${c[1]}', this)">Update</button>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch(e) { container.innerHTML = "Gagal memuat."; }
    }

    async function save(tgl, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        btn.innerText = "..";
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(curUnit)}`, {mode:'no-cors'});
        openUnit(curUnit, curGid);
    }

    async function prosesTambah() {
        const rawDate = document.getElementById('in-tgl').value;
        if(!rawDate) return alert("Pilih tanggal!");
        const d = new Date(rawDate);
        const tgl = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        const btn = document.querySelector("#modalAdd .btn-gold");
        btn.innerText = "Saving...";
        await fetch(`${WEB_URL}?action=tambah&tanggal=${encodeURIComponent(tgl)}&selisih=${document.getElementById('in-selisih').value || "0"}&status=${document.getElementById('in-status').value}&sheetName=${curUnit}`, {mode:'no-cors'});
        hideModal(); openUnit(curUnit, curGid);
    }

    function toggleTheme() {
        const b = document.body;
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerText = isDark ? '☀️ Light' : '🌙 Dark';
    }

    function filterUnits(t, el) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); el.classList.add('active');
        document.querySelectorAll('.unit-card').forEach(c => {
            if(t === 'all') c.classList.remove('hidden');
            else c.classList.toggle('hidden', c.getAttribute('data-state') !== 'problem');
        });
    }

    function showModal() { document.getElementById('modalAdd').style.display = 'flex'; }
    function hideModal() { document.getElementById('modalAdd').style.display = 'none'; }
</script>
</body>
</html>
