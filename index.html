<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Pro</title>
    <style>
        :root {
            --primary: #D4AF37;
            --bg: #0F1115;
            --card-bg: #1A1D23;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
            --red: #FF5252;
            --green: #4CAF50;
            --blue: #2196F3;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-main: #1C1E21;
            --text-dim: #65676B;
            --glass: rgba(0, 0, 0, 0.02);
            --border: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }

        .app-container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; }

        /* Modern Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .brand h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .brand p { font-size: 10px; color: var(--primary); font-weight: 700; letter-spacing: 3px; }

        .theme-pill { background: var(--card-bg); padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* Info Grid Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 15px 10px; border-radius: 18px; text-align: center; border: 1px solid var(--border); }
        .stat-card span { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
        .stat-card b { font-size: 18px; font-weight: 800; }
        .stat-card.alert b { color: var(--red); }

        /* Main Analytics Card */
        .main-card { 
            background: linear-gradient(145deg, var(--card-bg), var(--bg));
            border-radius: 30px; padding: 25px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 25px; margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .ring-wrap { position: relative; width: 90px; height: 90px; }
        svg { transform: rotate(-90deg); width: 90px; height: 90px; }
        circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .c-bg { stroke: var(--border); }
        .c-pro { stroke: var(--primary); stroke-dasharray: 251; stroke-dashoffset: 251; }

        .info-content h2 { font-size: 20px; margin-bottom: 4px; }
        .info-content p { color: var(--text-dim); font-size: 12px; line-height: 1.4; }

        /* List Styling */
        .section-title { font-size: 14px; font-weight: 700; color: var(--text-dim); margin-bottom: 15px; padding-left: 5px; }
        
        .kcp-card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .kcp-card:active { transform: scale(0.97); }
        .kcp-info h3 { font-size: 16px; margin-bottom: 4px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

        /* Detail Screen & Cards */
        .log-card { 
            background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 15px;
            border-left: 6px solid var(--green); position: relative; overflow: hidden;
        }
        .log-card.problem { border-left-color: var(--red); background: rgba(255, 82, 82, 0.03); }
        
        .log-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .log-header label { font-size: 9px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        .log-header b { font-size: 14px; display: block; margin-top: 2px; }

        .amount-box { background: var(--glass); padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; }
        .amount-box span { font-size: 18px; font-weight: 800; color: var(--primary); }

        .btn-group { display: grid; grid-template-columns: 1fr 80px; gap: 10px; }
        select { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); padding: 12px; border-radius: 12px; outline: none; -webkit-appearance: none; }
        .update-btn { background: var(--primary); border: none; border-radius: 12px; font-weight: 700; color: #000; cursor: pointer; }

        /* Navigation FAB */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; border: none; box-shadow: 0 10px 30px rgba(212,175,55,0.4); cursor: pointer; z-index: 100; }

        .hidden { display: none !important; }

        /* Modal Custom */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 100%; border-radius: 35px 35px 0 0; padding: 40px 30px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input { background: var(--bg); border: 1px solid var(--border); color: var(--text-main); padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 15px; font-size: 16px; }

        /* Chips */
        .chip-container { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 18px; border-radius: 15px; background: var(--card-bg); border: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-dim); white-space: nowrap; cursor: pointer; }
        .chip.active { background: var(--primary); color: #000; border-color: var(--primary); }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <header>
        <div class="brand">
            <p>BANKALTIMTARA</p>
            <h1>ATM Monitor</h1>
        </div>
        <div class="theme-pill" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</div>
    </header>

    <div id="main-screen">
        <div class="stats-grid">
            <div class="stat-card">
                <span>TOTAL KCP</span>
                <b id="stat-total">2</b>
            </div>
            <div class="stat-card alert">
                <span>MASALAH</span>
                <b id="stat-issue">0</b>
            </div>
            <div class="stat-card">
                <span>SAFE</span>
                <b id="stat-safe">0</b>
            </div>
        </div>

        <div class="main-card">
            <div class="ring-wrap">
                <svg><circle class="c-bg" cx="45" cy="45" r="40"></circle><circle id="progress-ring" class="c-pro" cx="45" cy="45" r="40"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:900; font-size:16px;" id="percent-txt">0%</div>
            </div>
            <div class="info-content">
                <h2 id="summary-txt">Menganalisa...</h2>
                <p id="summary-sub">Sinkronisasi data dengan server Google Sheets.</p>
            </div>
        </div>

        <div class="section-title">DAFTAR CABANG (KCP)</div>
        <div class="chip-container">
            <div class="chip active" onclick="filterUnits('all', this)">Semua Unit</div>
            <div class="chip" onclick="filterUnits('problem', this)">Perlu Perbaikan</div>
        </div>

        <div id="unit-list">
            <div class="kcp-card" onclick="openUnit('Gersik', '0')" id="card-Gersik">
                <div class="kcp-info">
                    <h3>KCP Gersik</h3>
                    <p style="font-size:12px;"><span id="dot-Gersik" class="status-dot"></span><span id="sub-Gersik">Memuat...</span></p>
                </div>
                <span style="color:var(--primary); font-size: 20px;">→</span>
            </div>
            <div class="kcp-card" onclick="openUnit('Maridan', '1565950302')" id="card-Maridan">
                <div class="kcp-info">
                    <h3>KCP Maridan</h3>
                    <p style="font-size:12px;"><span id="dot-Maridan" class="status-dot"></span><span id="sub-Maridan">Memuat...</span></p>
                </div>
                <span style="color:var(--primary); font-size: 20px;">→</span>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
            <button onclick="location.reload()" style="background:var(--card-bg); border:1px solid var(--border); color:var(--text-main); width:45px; height:45px; border-radius:15px; font-weight:bold; cursor:pointer;">❮</button>
            <h2 id="title-detail" style="font-size: 24px; font-weight: 800;">Detail Unit</h2>
        </div>
        
        <div class="chip-container">
            <div class="chip active" onclick="filterItems('all', this)">Semua Log</div>
            <div class="chip" onclick="filterItems('issue', this)">Log Masalah</div>
        </div>

        <div id="items-container"></div>
    </div>
</div>

<button class="fab" onclick="showModal()">+</button>

<div id="modalAdd" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:25px; text-align: center; font-weight: 800;">Input Log Baru</h2>
        <label style="font-size: 11px; font-weight: 800; color: var(--text-dim); margin-left: 5px;">TANGGAL TRANSAKSI</label>
        <input type="date" id="in-tgl">
        <label style="font-size: 11px; font-weight: 800; color: var(--text-dim); margin-left: 5px;">NOMINAL SELISIH (Rp)</label>
        <input type="number" id="in-selisih" placeholder="0">
        <label style="font-size: 11px; font-weight: 800; color: var(--text-dim); margin-left: 5px;">STATUS AWAL</label>
        <select id="in-status" style="width: 100%; margin-bottom: 25px; background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 15px;">
            <option value="PROSES">PROSES</option>
            <option value="DONE">DONE</option>
        </select>
        <button class="update-btn" style="width:100%; padding:18px; font-size:16px;" onclick="prosesTambah()">SIMPAN KE CLOUD</button>
        <button onclick="hideModal()" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:20px; cursor:pointer; font-weight: 600;">Batalkan</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "URL_DEPLOY_BARU_ANDA"; 

    let curUnit = "", curGid = "", gTotal = 0, gSafe = 0, gIssues = 0;

    function formatTgl(t) {
        const bln = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
        const p = t.split('/');
        return p.length < 3 ? t : `${p[0]} ${bln[parseInt(p[1]) - 1]} ${p[2]}`;
    }

    function formatRp(n) {
        return "Rp " + (parseInt(n) || 0).toLocaleString('id-ID');
    }

    window.onload = () => { check('Gersik', '0'); check('Maridan', '1565950302'); };

    async function check(nama, gid) {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            let iss = 0;
            rows.forEach(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
                if (!c[1]) return;
                gTotal++;
                if (c[2] !== "0" && c[2] !== "-" && c[2] !== "" && c[3].toUpperCase() !== "DONE") {
                    iss++; gIssues++;
                } else {
                    gSafe++;
                }
            });
            const sub = document.getElementById('sub-'+nama);
            const dot = document.getElementById('dot-'+nama);
            sub.innerText = iss > 0 ? iss + " Masalah Ditemukan" : "Operasional Normal";
            sub.style.color = iss > 0 ? "var(--red)" : "var(--green)";
            dot.style.background = iss > 0 ? "var(--red)" : "var(--green)";
            if(iss > 0) document.getElementById('card-'+nama).setAttribute('data-state', 'problem');
            
            updateStats();
        } catch(e) { console.error(e); }
    }

    function updateStats() {
        const p = Math.round((gSafe/gTotal)*100) || 0;
        document.getElementById('progress-ring').style.strokeDashoffset = 251 - (251*p/100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p >= 90 ? "Kinerja Prima" : "Butuh Atensi";
        document.getElementById('summary-sub').innerText = `Total ${gIssues} laporan selisih yang belum terselesaikan di seluruh unit KCP.`;
        
        document.getElementById('stat-issue').innerText = gIssues;
        document.getElementById('stat-safe').innerText = gSafe;
    }

    async function openUnit(nama, gid) {
        curUnit = nama; curGid = gid;
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "<div style='text-align:center; padding:50px;'><div class='stat-card'>Mengambil Data...</div></div>";

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            container.innerHTML = "";

            rows.forEach(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
                if(!c[1]) return;
                const isProb = (c[2] !== "0" && c[2] !== "-" && c[2] !== "" && c[3].toUpperCase() !== "DONE");

                const div = document.createElement('div');
                div.className = `log-card ${isProb ? 'problem' : ''} item-row`;
                div.innerHTML = `
                    <div class="log-header">
                        <div><label>Tanggal Transaksi</label><b>${formatTgl(c[1])}</b></div>
                        <div style="text-align:right"><label>Status</label><b style="color:${isProb?'var(--red)':'var(--green)'}">${c[3]}</b></div>
                    </div>
                    <div class="amount-box">
                        <label style="font-size:9px; color:var(--text-dim); display:block; margin-bottom:5px;">${isProb?'NOMINAL SELISIH':'KONDISI'}</label>
                        <span>${isProb ? formatRp(c[2]) : '✅ BALANCE'}</span>
                    </div>
                    <div class="btn-group">
                        <select id="sel-${c[1]}">
                            <option value="PROSES" ${c[3]==='PROSES'?'selected':''}>PROSES</option>
                            <option value="DONE" ${c[3]==='
