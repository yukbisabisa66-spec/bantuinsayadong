<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Pro - Bankaltimtara</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #003366 0%, #004e92 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 215, 0, 0.3);
            --accent: #FACC15;
            --red: #FF453A;
            --green: #32D74B;
        }

        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            min-height: 100vh; background: var(--bg-gradient); 
            display: flex; justify-content: center; align-items: center; padding: 20px; color: white;
            transition: 0.5s;
        }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 25px; border-radius: 35px; border: 1px solid var(--border);
            width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* Login Screen */
        #login-screen { text-align: center; }
        input[type="password"] {
            width: 100%; padding: 15px; border-radius: 15px; border: none; margin: 20px 0;
            background: rgba(255,255,255,0.2); color: white; text-align: center; font-size: 18px;
        }

        /* Header & Theme */
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 12px; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; text-align: center; }
        .stat-box small { display: block; font-size: 10px; opacity: 0.7; }
        .stat-box b { font-size: 16px; color: var(--accent); }

        /* Chart Area */
        canvas { margin-bottom: 20px; max-height: 180px; }

        /* Buttons */
        .btn-menu { 
            width: 100%; padding: 18px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white;
            font-weight: 600; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between;
        }

        .notif-dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; display: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen" class="glass-card">
    <h1 style="font-size: 40px; margin-bottom: 10px;">🏦</h1>
    <h2>ATM Monitor Access</h2>
    <p style="opacity: 0.7; font-size: 12px;">Masukkan Passcode Unit</p>
    <input type="password" id="passcode" placeholder="••••" maxlength="4">
    <button class="btn-menu" style="background: var(--accent); color: #003366; justify-content: center;" onclick="checkLogin()">Masuk</button>
</div>

<div id="main-dashboard" class="glass-card hidden">
    <div class="header-flex">
        <div>
            <p id="greeting" style="font-size: 12px; opacity: 0.8;"></p>
            <h3 style="color: var(--accent);">Admin Bankaltimtara</h3>
        </div>
        <button class="theme-btn" onclick="toggleTheme()">🌓 Tema</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <small>Selesai</small>
            <b id="count-done">0</b>
        </div>
        <div class="stat-box">
            <small>Belum</small>
            <b id="count-pending" style="color: var(--red);">0</b>
        </div>
    </div>

    <canvas id="myChart"></canvas>

    <div id="menu-list">
        <button class="btn-menu" onclick="muatData('Gersik', '0')">
            Unit Gersik <div id="dot-Gersik" class="notif-dot"></div>
        </button>
        <button class="btn-menu" onclick="muatData('Maridan', '1565950302')">
            Unit Maridan <div id="dot-Maridan" class="notif-dot"></div>
        </button>
    </div>
    
    <button class="btn-menu" style="border: none; color: var(--red); font-size: 12px; justify-content: center;" onclick="location.reload()">Logout</button>
</div>

<script>
    // KONFIGURASI
    const PUB_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRb6GSybyMkKf6JkokVF42Q-nIca3R6yuEGkbSwcgfF8qZbp8J293LHtXGKGB7VVA/pub?output=csv";
    const PIN_AKSES = "1234"; // Ganti password di sini
    
    let stats = { done: 0, pending: 0 };
    let myChart;

    // 1. LOGIN SYSTEM
    function checkLogin() {
        const input = document.getElementById('passcode').value;
        if(input === PIN_AKSES) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            initDashboard();
        } else {
            alert("Passcode Salah!");
            document.getElementById('passcode').value = "";
        }
    }

    // 2. THEME & GREETING
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    function setGreeting() {
        const hour = new Date().getHours();
        let greet = "Selamat Malam,";
        if (hour < 11) greet = "Selamat Pagi,";
        else if (hour < 15) greet = "Selamat Siang,";
        else if (hour < 19) greet = "Selamat Sore,";
        document.getElementById('greeting').innerText = greet;
    }

    // 3. DATA & DIAGRAM
    async function initDashboard() {
        setGreeting();
        const units = [{ n: 'Gersik', g: '0' }, { n: 'Maridan', g: '1565950302' }];
        
        for (let u of units) {
            try {
                const res = await fetch(`${PUB_URL}&gid=${u.g}&t=${Date.now()}`);
                const text = await res.text();
                const lines = text.split('\n').slice(1);
                
                lines.forEach(line => {
                    const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 4) {
                        const selVal = col[2].replace(/"/g, "").trim();
                        const ketVal = col[3].replace(/"/g, "").toUpperCase().trim();
                        
                        if (selVal !== "-" && selVal !== "0" && selVal !== "") {
                            if (ketVal === "DONE") stats.done++;
                            else {
                                stats.pending++;
                                document.getElementById('dot-' + u.n).style.display = 'block';
                            }
                        }
                    }
                });
            } catch (e) { console.error("Error load unit"); }
        }
        
        updateChart();
        document.getElementById('count-done').innerText = stats.done;
        document.getElementById('count-pending').innerText = stats.pending;
    }

    function updateChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Selesai', 'Belum'],
                datasets: [{
                    data: [stats.done, stats.pending],
                    backgroundColor: ['#32D74B', '#FF453A'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                plugins: {
                    legend: { display: true, labels: { color: 'white', font: { size: 10 } } }
                },
                cutout: '70%'
            }
        });
    }

    // Fungsi muatData tetap sama seperti sebelumnya untuk detail...
    function muatData(nama, gid) {
        alert("Membuka Detail Unit " + nama + ". Fitur ini menyambung ke kode detail sebelumnya.");
        // Anda bisa menyisipkan fungsi muatData yang sudah kita buat sebelumnya di sini
    }
</script>
</body>
</html>
