<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Supreme - Input Mode</title>
    <style>
        :root {
            --gold: #D4AF37; --gold-light: #F9E79F; --bg: #050505;
            --card: rgba(30, 30, 35, 0.9); --red: #FF3B30; --green: #34C759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 410px; position: relative; }

        /* THEME DASHBOARD */
        .analytics-card {
            background: linear-gradient(135deg, rgba(212,175,55,0.15), transparent);
            backdrop-filter: blur(20px); border-radius: 30px; padding: 20px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
            border: 1px solid rgba(212,175,55,0.2);
        }

        .ring-container { position: relative; width: 70px; height: 70px; }
        svg { transform: rotate(-90deg); width: 70px; height: 70px; }
        circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.05); }
        .circle-proc { stroke: var(--gold); stroke-dasharray: 251; stroke-dashoffset: 251; transition: 1s; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .unit-card { cursor: pointer; display: flex; justify-content: space-between; }

        /* FLOATING ACTION BUTTON */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--gold); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; color: black; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer; z-index: 100; border: none; font-weight: bold;
        }

        /* MODAL INPUT */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content { background: #1C1C1E; width: 90%; max-width: 350px; padding: 25px; border-radius: 30px; border: 1px solid var(--gold); }
        .modal-content input, .modal-content select {
            width: 100%; padding: 15px; margin: 10px 0; background: #2C2C2E;
            border: none; border-radius: 12px; color: white; outline: none;
        }
        
        .btn-gold { background: var(--gold); border: none; padding: 12px; border-radius: 12px; color: black; font-weight: 800; width: 100%; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <h1 style="font-size: 24px; margin-bottom: 20px;">ATM Dashboard</h1>
        <div class="analytics-card">
            <div class="ring-container">
                <svg><circle class="circle-bg" cx="35" cy="35" r="30"></circle><circle id="progress-ring" class="circle-proc" cx="35" cy="35" r="30"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:800; font-size:12px;" id="percent-txt">0%</div>
            </div>
            <div><p style="font-size:10px; opacity:0.5;">RELIABILITY</p><h3 id="summary-txt">Checking...</h3></div>
        </div>

        <div id="unit-list">
            <div class="card unit-card" onclick="openUnit('Gersik', '0')">Unit Gersik <span>􀆊</span></div>
            <div class="card unit-card" onclick="openUnit('Maridan', '1565950302')">Unit Maridan <span>􀆊</span></div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--gold); font-weight:800; margin-bottom:20px; cursor:pointer;">← DASHBOARD</button>
        <h2 id="title-detail" style="margin-bottom:20px;">Unit</h2>
        <div id="items-container"></div>
        <button class="fab" onclick="showModal()">+</button>
    </div>
</div>

<div id="modalAdd" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; color:var(--gold);">Tambah Data Baru</h3>
        <input type="text" id="in-tgl" placeholder="Tanggal (Contoh: 23/04/2026)">
        <input type="number" id="in-selisih" placeholder="Jumlah Selisih (Isi 0 jika aman)">
        <select id="in-status">
            <option value="PROSES">PROSES</option>
            <option value="DONE">DONE</option>
        </select>
        <button class="btn-gold" onclick="prosesTambah()">SIMPAN DATA</button>
        <button onclick="hideModal()" style="background:none; border:none; color:gray; width:100%; margin-top:15px;">Batal</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "ISI_URL_DEPLOYMENT_BARU_DI_SINI"; 

    let currentUnit = "";
    let currentGid = "";

    async function init() {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=0&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').length - 1;
        document.getElementById('percent-txt').innerText = "100%";
        document.getElementById('summary-txt').innerText = "System Ready";
    }

    async function openUnit(nama, gid) {
        currentUnit = nama; currentGid = gid;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = nama;
        
        const container = document.getElementById('items-container');
        container.innerHTML = "Memuat...";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<b>${c[1]}</b><br><small>Selisih: ${c[2]} | Status: ${c[3]}</small>`;
            container.appendChild(div);
        });
    }

    function showModal() { document.getElementById('modalAdd').style.display = 'flex'; }
    function hideModal() { document.getElementById('modalAdd').style.display = 'none'; }

    async function prosesTambah() {
        const tgl = document.getElementById('in-tgl').value;
        const sel = document.getElementById('in-selisih').value;
        const stat = document.getElementById('in-status').value;
        const btn = document.querySelector('.btn-gold');

        if(!tgl || !sel) return alert("Isi semua data!");

        btn.innerText = "Mengirim...";
        await fetch(`${WEB_URL}?action=tambah&tanggal=${tgl}&selisih=${sel}&status=${stat}&sheetName=${currentUnit}`, {mode:'no-cors'});
        
        hideModal();
        openUnit(currentUnit, currentGid);
        btn.innerText = "SIMPAN DATA";
    }

    window.onload = init;
</script>
</body>
</html>
