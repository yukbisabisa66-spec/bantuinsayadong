<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Pro Max</title>
    <style>
        :root {
            --blue: #0A84FF; --green: #30D158; --red: #FF453A; --orange: #FF9F0A;
            --bg: #000000; --card: rgba(28, 28, 30, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 400px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Progress Ring Section */
        .analytics-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            backdrop-filter: blur(20px); border-radius: 30px; padding: 20px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ring-container { position: relative; width: 80px; height: 80px; }
        svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.1); }
        .circle-proc { stroke: var(--blue); stroke-dasharray: 201; stroke-dashoffset: 201; transition: 1s ease-out; }

        .stat-info h3 { font-size: 22px; font-weight: 800; }
        .stat-info p { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        /* Unit Cards */
        .unit-card {
            background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;
        }
        .unit-card:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }

        /* Item Row Modern */
        .item-row {
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

        .btn-back { color: var(--blue); text-decoration: none; font-weight: 600; display: block; margin-bottom: 20px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 60px; gap: 10px; margin-top: 12px; }
        select { background: rgba(255,255,255,0.08); border: none; border-radius: 12px; color: white; padding: 10px; font-size: 14px; outline: none; }
        .btn-save { background: var(--blue); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }

        .hidden { display: none; }
        .danger-border { border-left: 4px solid var(--red) !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 5px;">Dashboard</h1>
        <p style="opacity: 0.5; font-size: 14px; margin-bottom: 25px;">Monitoring ATM Bankaltimtara</p>

        <div class="analytics-card">
            <div class="ring-container">
                <svg>
                    <circle class="circle-bg" cx="40" cy="40" r="32"></circle>
                    <circle id="progress-ring" class="circle-proc" cx="40" cy="40" r="32"></circle>
                </svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:800; font-size:14px;" id="percent-txt">0%</div>
            </div>
            <div class="stat-info">
                <p>Status Operasional</p>
                <h3 id="summary-txt">Mengecek...</h3>
            </div>
        </div>

        <div id="unit-list">
            <div class="unit-card" onclick="openUnit('Gersik', '0')">
                <div><h3 style="font-size:17px;">Unit Gersik</h3><p id="sub-Gersik" style="font-size:12px; opacity:0.5;">Loading...</p></div>
                <div id="badge-Gersik">􀆊</div>
            </div>
            <div class="unit-card" onclick="openUnit('Maridan', '1565950302')">
                <div><h3 style="font-size:17px;">Unit Maridan</h3><p id="sub-Maridan" style="font-size:12px; opacity:0.5;">Loading...</p></div>
                <div id="badge-Maridan">􀆊</div>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <a href="#" class="btn-back" onclick="location.reload()">􀆉 Dashboard</a>
        <h2 id="title-detail" style="margin-bottom: 20px;">Unit Gersik</h2>
        <div id="items-container"></div>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";

    let globalTotal = 0, globalSafe = 0;

    window.onload = init;

    async function init() {
        await checkUnit('Gersik', '0');
        await checkUnit('Maridan', '1565950302');
        updateRing();
    }

    async function checkUnit(nama, gid) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        
        let issues = 0;
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const sel = (c[2]||"").replace(/"/g,"").trim();
            const ket = (c[3]||"").replace(/"/g,"").toUpperCase().trim();
            globalTotal++;
            if (sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE") {
                issues++;
            } else {
                globalSafe++;
            }
        });

        const sub = document.getElementById('sub-' + nama);
        const badge = document.getElementById('badge-' + nama);
        if(issues > 0) {
            sub.innerText = issues + " Selisih Perlu Tindakan";
            sub.style.color = "var(--red)";
            badge.innerHTML = "⚠️";
        } else {
            sub.innerText = "Semua Clear";
            sub.style.color = "var(--green)";
            badge.innerHTML = "✅";
        }
    }

    function updateRing() {
        const percent = Math.round((globalSafe / globalTotal) * 100);
        const offset = 201 - (201 * percent / 100);
        document.getElementById('progress-ring').style.strokeDashoffset = offset;
        document.getElementById('percent-txt').innerText = percent + "%";
        document.getElementById('summary-txt').innerText = percent === 100 ? "All Systems Clear" : "Butuh Perhatian";
    }

    async function openUnit(nama, gid) {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = "Unit " + nama;
        
        const container = document.getElementById('items-container');
        container.innerHTML = "<p style='opacity:0.5; text-align:center;'>Diving into data...</p>";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;

            const tgl = c[1], sel = c[2], ket = c[3].toUpperCase();
            const isProblem = (sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE");

            const div = document.createElement('div');
            div.className = `item-row ${isProblem ? 'danger-border' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700; font-size:15px;">${tgl}</span>
                    <span style="font-size:13px; font-weight:800; color:${isProblem ? 'var(--red)' : 'var(--green)'}">
                        ${isProblem ? 'Rp ' + sel : (ket === 'DONE' ? '✓ DONE' : '✓ AMAN')}
                    </span>
                </div>
                <div class="action-grid">
                    <select id="sel-${tgl}">
                        <option value="" ${ket===""?'selected':''}>Pilih Status</option>
                        <option value="DONE" ${ket==="DONE"?'selected':''}>DONE</option>
                        <option value="PROSES" ${ket==="PROSES"?'selected':''}>PROSES</option>
                    </select>
                    <button class="btn-save" onclick="save('${tgl}','${nama}',this)">OK</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function save(tgl, unit, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        if(!val) return;
        btn.innerText = "..";
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(unit)}`, {mode:'no-cors'});
        btn.innerText = "✓";
        setTimeout(() => openUnit(unit, unit==='Gersik'?'0':'1565950302'), 500);
    }
</script>
</body>
</html>
