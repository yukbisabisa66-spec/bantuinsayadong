<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Multi-OS</title>
    <style>
        /* --- THEME ENGINE --- */
        :root {
            --primary: #D4AF37; --bg: #0A0A0B; --card: #1C1C1E; --text: #FFFFFF;
            --subtext: #8E8E93; --radius: 22px; --border: rgba(255,255,255,0.08);
        }

        /* Tema iOS (Glassmorphism) */
        [data-theme="ios"] {
            --bg: #000000; --card: rgba(28, 28, 30, 0.7); --primary: #007AFF;
            --text: #ffffff; --radius: 14px; --glass: blur(20px);
        }

        /* Tema Android (Material You) */
        [data-theme="android"] {
            --bg: #FDF8FF; --card: #EADDFF; --primary: #6750A4;
            --text: #1C1B1F; --subtext: #49454F; --radius: 28px; --border: transparent;
        }

        /* Tema Gold (Corporate) */
        [data-theme="gold"] {
            --bg: #121212; --card: #1E1E1E; --primary: #D4AF37;
            --text: #FFFFFF; --radius: 20px; --border: 1px solid #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 400px; position: relative; }

        /* Theme Selector Bar */
        .theme-selector { 
            display: flex; gap: 8px; margin-bottom: 25px; background: var(--card); 
            padding: 5px; border-radius: 15px; border: 1px solid var(--border);
            backdrop-filter: var(--glass);
        }
        .t-btn { 
            flex: 1; padding: 8px; border-radius: 10px; border: none; background: transparent; 
            color: var(--text); font-size: 11px; font-weight: 700; cursor: pointer; opacity: 0.5;
        }
        .t-btn.active { background: var(--primary); color: #fff; opacity: 1; }

        header { text-align: left; margin-bottom: 25px; }
        header h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }

        .analytics-card { 
            background: var(--card); border-radius: var(--radius); padding: 24px; 
            display: flex; align-items: center; gap: 20px; margin-bottom: 25px; 
            border: 1px solid var(--border); backdrop-filter: var(--glass);
        }

        /* Progress Ring */
        .ring { position: relative; width: 65px; height: 65px; }
        svg { transform: rotate(-90deg); width: 65px; height: 65px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .c-bg { stroke: rgba(128,128,128,0.1); }
        .c-pro { stroke: var(--primary); stroke-dasharray: 188; stroke-dashoffset: 188; }

        /* Card Styles */
        .card { 
            background: var(--card); border-radius: var(--radius); padding: 20px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
            backdrop-filter: var(--glass); cursor: pointer;
        }
        .card:active { transform: scale(0.96); }
        .unit-card { display: flex; justify-content: space-between; align-items: center; }
        .is-problem { border-left: 5px solid #FF453A !important; }

        /* Chips */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .chip { 
            padding: 10px 20px; border-radius: 50px; background: var(--card); 
            font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
        }
        .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Utility */
        .hidden { display: none !important; }
        .btn-main { 
            width: 100%; padding: 16px; border-radius: var(--radius); 
            background: var(--primary); border: none; font-weight: 800; cursor: pointer;
        }
        .fab { 
            position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; 
            background: var(--primary); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 30px; color: #fff; border: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Modal */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: var(--bg); padding: 30px; border-radius: var(--radius); width: 100%; max-width: 350px; border: 1px solid var(--border); }
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
        }
    </style>
</head>
<body data-theme="gold">

<div class="app-container">
    <div class="theme-selector">
        <button class="t-btn active" onclick="setTheme('gold', this)">GOLD</button>
        <button class="t-btn" onclick="setTheme('ios', this)">iOS</button>
        <button class="t-btn" onclick="setTheme('android', this)">ANDROID</button>
    </div>

    <div id="menu-screen">
        <header>
            <p style="color: var(--primary); font-size: 12px; font-weight: 800; letter-spacing: 2px;">DASHBOARD</p>
            <h1>Monitor ATM</h1>
        </header>

        <div class="analytics-card">
            <div class="ring">
                <svg><circle class="c-bg" cx="32" cy="32" r="30"></circle><circle id="progress-ring" class="c-pro" cx="32" cy="32" r="30"></circle></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:900; font-size:14px;" id="percent-txt">0%</div>
            </div>
            <div>
                <h3 id="summary-txt">Menganalisa...</h3>
                <p id="summary-sub" style="font-size: 12px; color: var(--subtext);">KCP Bankaltimtara</p>
            </div>
        </div>

        <div class="filter-bar">
            <div class="chip active" onclick="filterUnits('all', this)">Semua</div>
            <div class="chip" onclick="filterUnits('problem', this)">Masalah</div>
        </div>

        <div id="unit-list">
            <div class="card unit-card" onclick="openUnit('Gersik', '0')" id="card-Gersik">
                <div><h3 id="name-Gersik">KCP Gersik</h3><p id="sub-Gersik" style="font-size:13px; opacity:0.6;">Syncing...</p></div>
                <div style="color:var(--primary)">❯</div>
            </div>
            <div class="card unit-card" onclick="openUnit('Maridan', '1565950302')" id="card-Maridan">
                <div><h3 id="name-Maridan">KCP Maridan</h3><p id="sub-Maridan" style="font-size:13px; opacity:0.6;">Syncing...</p></div>
                <div style="color:var(--primary)">❯</div>
            </div>
        </div>
    </div>

    <div id="detail-screen" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); font-weight:800; cursor:pointer; margin-bottom:20px;">❮ KEMBALI</button>
        <h2 id="title-detail" style="margin-bottom:20px; font-size: 24px;">Detail</h2>
        <div id="items-container"></div>
        <button class="fab" onclick="showModal()">+</button>
    </div>
</div>

<div id="modalAdd" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px;">Input Data</h2>
        <input type="date" id="in-tgl">
        <input type="number" id="in-selisih" placeholder="Nominal Selisih">
        <select id="in-status">
            <option value="PROSES">PROSES</option>
            <option value="DONE">DONE</option>
        </select>
        <button class="btn-main" onclick="prosesTambah()">SIMPAN DATA</button>
        <button onclick="hideModal()" style="width:100%; background:none; border:none; color:var(--subtext); margin-top:15px; cursor:pointer;">Batal</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_URL = "URL_DEPLOY_ANDA"; 

    let curUnit = "", curGid = "", gTotal = 0, gSafe = 0;

    // --- Logic Tema ---
    function setTheme(theme, btn) {
        document.body.setAttribute('data-theme', theme);
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // --- Logic Data (Sama dengan versi sebelumnya namun dioptimalkan) ---
    window.onload = () => { 
        checkUnit('Gersik', '0'); 
        checkUnit('Maridan', '1565950302'); 
    };

    async function checkUnit(nama, gid) {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            let iss = 0;
            rows.forEach(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
                if (!c[1]) return;
                gTotal++;
                if (c[2] !== "0" && c[2] !== "-" && c[2] !== "" && c[3].toUpperCase() !== "DONE") iss++; else gSafe++;
            });
            const el = document.getElementById('sub-'+nama);
            el.innerText = iss > 0 ? iss + " Masalah" : "Operasional Aman";
            el.style.color = iss > 0 ? "#FF453A" : "#32D74B";
            if(iss > 0) document.getElementById('card-'+nama).classList.add('is-problem');
            updateRing();
        } catch(e) { console.error("Error"); }
    }

    function updateRing() {
        const p = Math.round((gSafe/gTotal)*100) || 0;
        document.getElementById('progress-ring').style.strokeDashoffset = 188 - (188*p/100);
        document.getElementById('percent-txt').innerText = p + "%";
        document.getElementById('summary-txt').innerText = p >= 90 ? "Kinerja Bagus" : "Perlu Review";
    }

    async function openUnit(nama, gid) {
        curUnit = nama; curGid = gid;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
        document.getElementById('title-detail').innerText = "KCP " + nama;
        const container = document.getElementById('items-container');
        container.innerHTML = "Memuat...";

        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}`);
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        container.innerHTML = "";

        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
            if(!c[1]) return;
            const isProb = (c[2] !== "0" && c[2] !== "-" && c[3].toUpperCase() !== "DONE");
            const div = document.createElement('div');
            div.className = `card ${isProb ? 'is-problem' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <b>${c[1]}</b>
                    <span style="color:${isProb?'#FF453A':'#32D74B'}">${isProb ? 'Rp '+c[2] : 'AMAN'}</span>
                </div>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <select id="sel-${c[1]}" style="margin-bottom:0; flex:1;">
                        <option value="PROSES" ${c[3]==='PROSES'?'selected':''}>PROSES</option>
                        <option value="DONE" ${c[3]==='DONE'?'selected':''}>DONE</option>
                    </select>
                    <button class="btn-main" style="width:80px; padding:10px;" onclick="save('${c[1]}', this)">OK</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function save(tgl, btn) {
        const val = document.getElementById('sel-'+tgl).value;
        btn.innerText = "..";
        await fetch(`${WEB_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(curUnit)}`, {mode:'no-cors'});
        openUnit(curUnit, curGid);
    }

    async function prosesTambah() {
        const d = new Date(document.getElementById('in-tgl').value);
        const tgl = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        await fetch(`${WEB_URL}?action=tambah&tanggal=${encodeURIComponent(tgl)}&selisih=${document.getElementById('in-selisih').value}&status=${document.getElementById('in-status').value}&sheetName=${curUnit}`, {mode:'no-cors'});
        hideModal(); openUnit(curUnit, curGid);
    }

    function filterUnits(t, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active');
        document.querySelectorAll('.unit-card').forEach(c => {
            if(t === 'all') c.classList.remove('hidden');
            else c.classList.toggle('hidden', !c.classList.contains('is-problem'));
        });
    }

    function showModal() { document.getElementById('modalAdd').style.display = 'flex'; }
    function hideModal() { document.getElementById('modalAdd').style.display = 'none'; }
</script>
</body>
</html>
