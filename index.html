<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Elite</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gold: #FACC15;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-thick: rgba(255, 255, 255, 0.15);
            --danger: #FF453A;
            --success: #32D74B;
            --warning: #FF9F0A;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
        }

        body { 
            min-height: 100vh; 
            background: #000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,20%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(45,100%,20%,1) 0, transparent 50%);
            display: flex; justify-content: center; align-items: center; padding: 15px; color: white;
            overflow-x: hidden;
        }

        /* Container Utama dengan efek Floating */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 30px 20px; 
            border-radius: 45px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 410px; 
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Banner Notif Pop-up */
        .banner-notif {
            background: var(--danger);
            color: white; padding: 12px; border-radius: 22px;
            margin-bottom: 20px; display: none; font-weight: 700; text-align: center; 
            font-size: 13px; box-shadow: 0 10px 30px rgba(255, 69, 58, 0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h2 { font-weight: 800; font-size: 34px; margin-bottom: 8px; text-align: center; letter-spacing: -1.5px; }
        .subtitle { text-align: center; opacity: 0.5; font-size: 14px; margin-bottom: 35px; }

        /* Button Menu ala Control Center iOS */
        .btn-menu { 
            width: 100%; margin-bottom: 15px; padding: 25px; 
            background: var(--glass-thick); color: white; border: none;
            border-radius: 28px; font-weight: 600; font-size: 19px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .btn-menu:active { transform: scale(0.94); background: rgba(255,255,255,0.2); }

        .chevron { opacity: 0.3; font-size: 20px; }

        /* Badge Notif dengan Glow */
        .notif-badge {
            background: var(--danger); color: white; width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 12px; font-weight: 900;
            box-shadow: 0 0 20px var(--danger);
        }

        /* Detail List */
        .row-item {
            background: rgba(255, 255, 255, 0.04);
            margin-bottom: 10px; padding: 18px; border-radius: 22px;
            display: flex; flex-direction: column; gap: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row-header { display: flex; justify-content: space-between; align-items: center; }
        .row-date { font-weight: 700; font-size: 15px; }
        .row-status { font-weight: 800; font-size: 14px; }

        /* Modern Select & Button */
        .action-area { display: flex; gap: 10px; }
        
        select { 
            flex: 1; background: rgba(255,255,255,0.1); border: none;
            padding: 12px; border-radius: 12px; color: white; font-weight: 600;
            appearance: none; text-align: center;
        }

        .btn-save { 
            background: var(--ios-blue); border: none; padding: 12px 20px;
            border-radius: 12px; color: white; font-weight: 700; cursor: pointer;
        }

        .loader-ring {
            width: 40px; height: 40px; border: 4px solid var(--glass);
            border-top: 4px solid var(--ios-blue); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 40px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="glass-card">
    <div id="notif-banner" class="banner-notif">ADA SELISIH DANA</div>

    <div id="menu-screen">
        <h2>ATM Monitor</h2>
        <p class="subtitle">Bankaltimtara Digital Service</p>
        
        <button class="btn-menu" onclick="muatData('Gersik', '0')">
            <span>Unit Gersik</span> 
            <div id="badge-Gersik" class="chevron">􀆊</div>
        </button>
        
        <button class="btn-menu" onclick="muatData('Maridan', '1565950302')">
            <span>Unit Maridan</span> 
            <div id="badge-Maridan" class="chevron">􀆊</div>
        </button>
    </div>

    <div id="detail-screen" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <button onclick="location.reload()" style="background:none; border:none; color:var(--ios-blue); font-size: 17px; cursor:pointer; font-weight:600;">Selesai</button>
            <h3 id="unit-nama-title" style="font-size: 18px;"></h3>
            <div style="width: 50px;"></div>
        </div>

        <div id="data-list">
            </div>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";

    window.onload = cekStatusAwal;

    async function cekStatusAwal() {
        const units = [{ n: 'Gersik', g: '0' }, { n: 'Maridan', g: '1565950302' }];
        let adaMasalahGlobal = false;

        for (let u of units) {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${u.g}&t=${Date.now()}`);
                const csv = await res.text();
                const baris = csv.split('\n').slice(1);
                
                let masalah = baris.some(b => {
                    const c = b.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const sel = (c[2] || "").replace(/"/g, "").trim();
                    const ket = (c[3] || "").replace(/"/g, "").toUpperCase().trim();
                    return (sel !== "" && sel !== "0" && sel !== "-" && ket !== "DONE");
                });

                if (masalah) {
                    adaMasalahGlobal = true;
                    document.getElementById('badge-' + u.n).innerHTML = `<div class="notif-badge">!</div>`;
                }
            } catch (e) {}
        }
        if (adaMasalahGlobal) document.getElementById('notif-banner').style.display = 'block';
    }

    async function muatData(nama, gid) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('unit-nama-title').innerText = nama;
        
        const list = document.getElementById('data-list');
        list.innerHTML = `<div class="loader-ring"></div>`;

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const csv = await res.text();
            const baris = csv.split('\n').slice(1);
            list.innerHTML = "";

            baris.forEach((b, i) => {
                const c = b.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                if (!c[1] || c[1] === "null") return;

                const tgl = c[1], sel = c[2], ket = (c[3] || "").toUpperCase();
                const isAman = (sel === "" || sel === "0" || sel === "-");
                const isWarning = (!isAman && ket !== "DONE");

                const card = document.createElement('div');
                card.className = 'row-item';
                card.style.animationDelay = `${i * 0.05}s`;
                if(isWarning) card.style.borderLeft = "4px solid var(--warning)";

                card.innerHTML = `
                    <div class="row-header">
                        <span class="row-date">${tgl}</span>
                        <span class="row-status" style="color: ${isAman ? 'var(--success)' : 'var(--warning)'}">
                            ${isAman ? '✓ AMAN' : 'Rp ' + sel}
                        </span>
                    </div>
                    <div class="action-area">
                        <select id="select-${tgl}">
                            <option value="" ${ket==""?'selected':''}>Set Status...</option>
                            <option value="DONE" ${ket=="DONE"?'selected':''}>DONE</option>
                            <option value="PROSES" ${ket=="PROSES"?'selected':''}>PROSES</option>
                        </select>
                        <button class="btn-save" onclick="updateStatus('${tgl}', '${nama}', this)">Simpan</button>
                    </div>
                `;
                list.appendChild(card);
            });
        } catch (e) { list.innerHTML = "Gagal memuat."; }
    }

    async function updateStatus(tgl, unit, btn) {
        const status = document.getElementById(`select-${tgl}`).value;
        if(!status) return alert("Pilih status!");

        btn.innerText = "...";
        btn.disabled = true;

        const url = `${WEB_APP_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(status)}&sheetName=${encodeURIComponent(unit)}`;

        try {
            await fetch(url, { method: 'POST', mode: 'no-cors' });
            btn.innerText = "✓";
            btn.style.background = "var(--success)";
            
            // Efek visual sukses
            setTimeout(() => {
                btn.closest('.row-item').style.opacity = "0.5";
                btn.innerText = "Tersimpan";
            }, 800);
        } catch (e) {
            alert("Error");
            btn.innerText = "Simpan";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
