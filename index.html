<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor - Liquid Glass Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CONFIG THEMES */
        :root {
            --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --accent: #FACC15;
            --green: #32D74B;
            --red: #FF453A;
        }

        [data-theme="liquid-gold"] {
            --bg: radial-gradient(circle at top right, #453a00, #000);
            --glass: rgba(250, 204, 21, 0.1);
            --border: rgba(250, 204, 21, 0.3);
            --accent: #FACC15;
        }

        [data-theme="deep-ocean"] {
            --bg: linear-gradient(160deg, #001a33 0%, #000000 100%);
            --glass: rgba(0, 122, 255, 0.1);
            --border: rgba(0, 122, 255, 0.4);
            --accent: #007AFF;
        }

        [data-theme="sunset-vibes"] {
            --bg: linear-gradient(135deg, #4c0519 0%, #000000 100%);
            --glass: rgba(251, 113, 133, 0.1);
            --border: rgba(251, 113, 133, 0.3);
            --accent: #fb7185;
        }

        [data-theme="emerald-night"] {
            --bg: linear-gradient(135deg, #064e3b 0%, #000 100%);
            --glass: rgba(50, 215, 75, 0.05);
            --border: rgba(50, 215, 75, 0.3);
            --accent: #32D74B;
        }

        [data-theme="midnight-purple"] {
            --bg: linear-gradient(135deg, #2e1065 0%, #000 100%);
            --glass: rgba(168, 85, 247, 0.1);
            --border: rgba(168, 85, 247, 0.3);
            --accent: #a855f7;
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        
        body { 
            min-height: 100vh; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: flex-start; padding: 20px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* LIQUID GLASS CARD */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 40px; border: 1px solid var(--border);
            width: 100%; max-width: 450px; padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        /* COMPONENTS */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        select.theme-selector {
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 15px; font-size: 12px; outline: none;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 20px; text-align: center;
            border: 1px solid var(--border);
        }

        .btn-ios {
            width: 100%; padding: 20px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); border-radius: 25px; color: white;
            font-weight: 600; margin-bottom: 12px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }

        .btn-ios:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.15); }

        .notif-badge { width: 10px; height: 10px; background: var(--red); border-radius: 50%; box-shadow: 0 0 12px var(--red); }

        .table-container { background: rgba(0, 0, 0, 0.3); border-radius: 25px; overflow: hidden; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { padding: 15px; background: rgba(255,255,255,0.05); color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        .hidden { display: none !important; }
        canvas { margin: 20px 0; max-height: 200px; }

        .btn-save { background: var(--accent); color: black; border: none; padding: 6px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen" class="glass-card">
    <div style="text-align: center;">
        <div style="font-size: 60px; margin-bottom: 10px;">🛡️</div>
        <h2 style="margin-bottom: 5px;">Secure Access</h2>
        <p style="opacity: 0.5; font-size: 13px; margin-bottom: 25px;">Masukkan PIN Bankaltimtara</p>
        <input type="password" id="passcode" maxlength="4" style="width: 80%; background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: white; text-align: center; padding: 15px; border-radius: 20px; font-size: 24px; letter-spacing: 8px; margin-bottom: 20px;">
        <button class="btn-ios" style="background: var(--accent); color: black; justify-content: center;" onclick="checkLogin()">UNLOCK</button>
    </div>
</div>

<div id="main-dashboard" class="glass-card hidden">
    <div class="header">
        <div>
            <p id="greeting" style="font-size: 12px; opacity: 0.6;"></p>
            <h3 style="color: var(--accent); font-size: 20px;">ATM Dashboard</h3>
        </div>
        <select class="theme-selector" onchange="changeTheme(this.value)">
            <option value="default">Liquid Glass</option>
            <option value="liquid-gold">Liquid Gold</option>
            <option value="deep-ocean">Deep Ocean</option>
            <option value="sunset-vibes">Sunset Vibes</option>
            <option value="emerald-night">Emerald Night</option>
            <option value="midnight-purple">Midnight Purple</option>
        </select>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="stat-box"><small style="opacity:0.6; font-size:10px;">DONE</small><br><b id="total-done" style="font-size:22px;">0</b></div>
        <div class="stat-box"><small style="opacity:0.6; font-size:10px;">SELISIH</small><br><b id="total-pending" style="color: var(--red); font-size:22px;">0</b></div>
    </div>

    <canvas id="statChart"></canvas>

    <div id="unit-list">
        <button class="btn-ios" onclick="muatData('Gersik', '0')">Unit Gersik <span id="dot-Gersik" class="notif-badge" style="display:none;"></span></button>
        <button class="btn-ios" onclick="muatData('Maridan', '1565950302')">Unit Maridan <span id="dot-Maridan" class="notif-badge" style="display:none;"></span></button>
    </div>
</div>

<div id="detail-unit" class="glass-card hidden">
    <h3 id="nama-unit-header" style="text-align:center; color:var(--accent); margin-bottom:20px;"></h3>
    <div class="table-container">
        <table>
            <thead><tr><th>Tgl</th><th>Nominal</th><th>Aksi</th></tr></thead>
            <tbody id="tabel-body"></tbody>
        </table>
    </div>
    <button class="btn-ios" style="margin-top:20px; border:none; background:transparent; justify-content:center; color:var(--accent);" onclick="backToMenu()">⬅ KEMBALI</button>
</div>

<script>
    const PUB_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRb6GSybyMkKf6JkokVF42Q-nIca3R6yuEGkbSwcgfF8qZbp8J293LHtXGKGB7VVA/pub?output=csv";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";
    const PIN = "1234";

    let stats = { done: 0, pending: 0 };
    let myChart = null;

    function checkLogin() {
        if(document.getElementById('passcode').value === PIN) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            initData();
        } else { alert("PIN Salah!"); }
    }

    function changeTheme(val) {
        document.body.setAttribute('data-theme', val);
    }

    async function initData() {
        const jam = new Date().getHours();
        document.getElementById('greeting').innerText = jam < 11 ? "Good Morning," : jam < 15 ? "Good Afternoon," : jam < 19 ? "Good Evening," : "Good Night,";
        
        stats = { done: 0, pending: 0 };
        const units = [{n:'Gersik', g:'0'}, {n:'Maridan', g:'1565950302'}];

        for(let u of units) {
            const res = await fetch(`${PUB_URL}&gid=${u.g}&t=${Date.now()}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            let hasProblem = false;

            rows.forEach(r => {
                const col = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(col.length >= 4) {
                    const sel = col[2].replace(/"/g, "").trim();
                    const ket = col[3].replace(/"/g, "").toUpperCase().trim();
                    if(sel && sel !== "0" && sel !== "-") {
                        if(ket === "DONE") stats.done++;
                        else { stats.pending++; hasProblem = true; }
                    }
                }
            });
            if(hasProblem) document.getElementById('dot-'+u.n).style.display = 'block';
        }
        document.getElementById('total-done').innerText = stats.done;
        document.getElementById('total-pending').innerText = stats.pending;
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('statChart').getContext('2d');
        if(myChart) myChart.destroy();
        
        const isFullGreen = stats.pending === 0;
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: isFullGreen ? [1, 0] : [stats.done, stats.pending],
                    backgroundColor: isFullGreen ? ['#32D74B', '#32D74B'] : ['#32D74B', '#FF453A'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '85%', plugins: { tooltip: { enabled: !isFullGreen } } }
        });
    }

    async function muatData(nama, gid) {
        activeSheet = nama;
        document.getElementById('main-dashboard').classList.add('hidden');
        document.getElementById('detail-unit').classList.remove('hidden');
        document.getElementById('nama-unit-header').innerText = nama;
        const tb = document.getElementById('tabel-body');
        tb.innerHTML = "<tr><td colspan='3'>Syncing...</td></tr>";

        const res = await fetch(`${PUB_URL}&gid=${gid}&t=${Date.now()}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        tb.innerHTML = "";

        rows.forEach(r => {
            const col = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, ""));
            if(col[1]) {
                const isProblem = (col[2] && col[2] !== "0" && col[2] !== "-" && col[3].toUpperCase() !== "DONE");
                tb.innerHTML += `<tr style="background:${isProblem ? 'rgba(255,69,58,0.1)' : ''}">
                    <td>${col[1]}</td>
                    <td style="color:${isProblem ? 'var(--red)' : 'var(--green)'}">${!col[2] || col[2]=="0" ? 'OK' : col[2]}</td>
                    <td><button class="btn-save" onclick="updateStatus('${col[1]}', '${nama}')">SET</button></td>
                </tr>`;
            }
        });
    }

    function backToMenu() {
        document.getElementById('detail-unit').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
    }

    async function updateStatus(tgl, sheet) {
        alert("Updating " + tgl + "...");
        const url = `${WEB_APP_URL}?tanggal=${encodeURIComponent(tgl)}&status=DONE&sheetName=${encodeURIComponent(sheet)}`;
        await fetch(url, { method: 'POST', mode: 'no-cors' });
        location.reload();
    }
</script>
</body>
</html>
