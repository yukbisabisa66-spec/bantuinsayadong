<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Cashman Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #004e92; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 25px; border: 1px solid white; width: 90%; max-width: 450px; text-align: center; }
        .btn-unit { background: #facc15; color: #004e92; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; position: relative; }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; padding: 4px 8px; border-radius: 10px; animation: blink 1s infinite; }
        .table-area { background: white; color: black; border-radius: 15px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .warning { background: #ffebeb; color: #d00000; font-weight: bold; }
        .hidden { display: none; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="glass-card">
    <div id="menu">
        <h2 style="color:#facc15">Dashboard ATM</h2>
        <button class="btn-unit" onclick="muatData('Gersik', '0')">
            UNIT GERSIK <span id="badge-0" class="notif-badge hidden">!</span>
        </button>
        <button class="btn-unit" onclick="muatData('Maridan', '1565950302')">
            UNIT MARIDAN <span id="badge-1565950302" class="notif-badge hidden">!</span>
        </button>
    </div>

    <div id="detail" class="hidden">
        <h3 id="unit-nama" style="color:#facc15"></h3>
        <div class="table-area">
            <table>
                <thead><tr><th>Tgl</th><th>Selisih</th><th>Status</th></tr></thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
        <button class="btn-unit" style="background:#eee" onclick="location.reload()">KEMBALI</button>
    </div>
</div>

<script>
    // ID Spreadsheet Anda (tetap)
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";

    async function muatData(nama, gid) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('detail').classList.remove('hidden');
        document.getElementById('unit-nama').innerText = "Unit: " + nama;
        const tb = document.getElementById('isi-tabel');
        tb.innerHTML = "<tr><td colspan='3'>Menyambungkan...</td></tr>";

        // URL Gviz dengan parameter t=... untuk memaksa ambil data terbaru (anti-cache)
        const url = `https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;

        try {
            const res = await fetch(url);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            tb.innerHTML = "";

            lines.forEach(line => {
                const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                const tgl = col[1];
                const sel = col[2];
                const ket = (col[3] || "").toUpperCase();

                if (tgl && tgl !== "" && tgl !== "null") {
                    const blmIsi = (ket === "" || ket === "NULL" || ket === "-");
                    tb.innerHTML += `<tr class="${blmIsi ? 'warning' : ''}">
                        <td>${tgl}</td>
                        <td>${sel}</td>
                        <td>${blmIsi ? '⚠️ CEK' : '✅ DONE'}</td>
                    </tr>`;
                }
            });
        } catch (e) {
            tb.innerHTML = "<tr><td colspan='3' style='color:red'>Gagal Konek! Cek Internet/Izin Sheets.</td></tr>";
        }
    }

    // Fungsi cek notifikasi otomatis saat baru buka web
    async function cekNotif() {
        const gids = ['0', '1565950302'];
        for (let gid of gids) {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
                const text = await res.text();
                const adaKosong = text.split('\n').slice(1).some(line => {
                    const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                    return col[1] && col[1] !== "null" && (col[3] === "" || col[3] === "NULL");
                });
                if (adaKosong) document.getElementById('badge-' + gid).classList.remove('hidden');
            } catch (e) {}
        }
    }
    cekNotif();
</script>
</body>
</html>
