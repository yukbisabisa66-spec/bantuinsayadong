<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor - Bankaltimtara</title>
    <style>
        :root {
            /* Light Mode (Default) */
            --bg-gradient: linear-gradient(135deg, #003366 0%, #004e92 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #003366;
            --glass-border: rgba(0, 51, 102, 0.2);
            --accent-yellow: #f2bc00; 
            --accent-red: #FF453A;
            --accent-green: #32D74B;
            --btn-bg: rgba(0, 51, 102, 0.05);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #001a33 0%, #000000 100%);
            --card-bg: rgba(20, 30, 45, 0.85);
            --text-color: #ffffff;
            --glass-border: rgba(255, 215, 0, 0.3);
            --btn-bg: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; transition: 0.3s ease; }
        
        body { 
            min-height: 100vh; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--text-color);
        }

        .glass-card { 
            background: var(--card-bg); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 25px; border-radius: 30px; border: 1px solid var(--glass-border);
            width: 100%; max-width: 800px; /* Lebar otomatis untuk desktop */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        /* Responsive Desktop */
        @media (min-width: 768px) {
            .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            h2 { font-size: 32px !important; }
        }

        .header-tools { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 10px; }
        
        .theme-toggle {
            background: var(--btn-bg); border: 1px solid var(--glass-border);
            color: var(--text-color); padding: 8px 15px; border-radius: 12px;
            cursor: pointer; font-size: 12px; font-weight: bold;
        }

        .banner-notif {
            background: var(--accent-red); color: white; padding: 12px; border-radius: 15px;
            margin-bottom: 20px; display: none; font-weight: 700; text-align: center; font-size: 13px;
        }

        h2 { font-weight: 800; margin-bottom: 25px; text-align: center; font-size: 24px; }

        .btn-menu { 
            width: 100%; margin-bottom: 12px; padding: 18px; 
            background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--glass-border); 
            border-radius: 18px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }

        .notif-badge { background: var(--accent-red); color: white; font-size: 10px; padding: 4px 8px; border-radius: 10px; }

        /* Tabel Responsif */
        .table-container { overflow-x: auto; background: rgba(0,0,0,0.05); border-radius: 15px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th { background: var(--accent-yellow); color: #003366; padding: 12px; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--glass-border); font-size: 13px; text-align: center; }

        .warning { background: rgba(255, 69, 58, 0.1) !important; }
        .btn-save { background: var(--accent-yellow); color: #003366; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-back { background: transparent; border: 1px solid var(--text-color); border-radius: 15px; padding: 12px; width: 100%; color: var(--text-color); margin-top: 15px; cursor: pointer; }

        /* Filter Switch */
        .filter-box { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--btn-bg); border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="header-tools">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    </div>

    <div id="notif-banner" class="banner-notif">⚠️ PERHATIAN: ADA SELISIH BELUM SELESAI</div>

    <div id="menu">
        <h2>ATM Monitor 🏦</h2>
        <div class="menu-grid">
            <button id="btn-Gersik" class="btn-menu" onclick="muatData('Gersik', '0')">Unit Gersik <span>❯</span></button>
            <button id="btn-Maridan" class="btn-menu" onclick="muatData('Maridan', '1565950302')">Unit Maridan <span>❯</span></button>
        </div>
    </div>

    <div id="detail" style="display:none;">
        <h3 id="unit-nama" style="text-align:center; margin-bottom:15px;"></h3>
        
        <div class="filter-box">
            <span style="font-size: 12px; font-weight:600;">Tampilkan Selisih Saja</span>
            <input type="checkbox" id="toggleFilter" onchange="jalankanFilter()" style="width:20px; height:20px; cursor:pointer;">
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>Tgl</th><th>Selisih</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
        <button class="btn-back" onclick="location.reload()">KEMBALI KE MENU</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYIPo4ew3ggxHruF0kg9H0XX9nkrSnFqdDzCY_DMTCk4xdFT6VVWqslh3QtAtf2z8HKg/exec";
    let sheetSekarang = "";

    window.onload = () => {
        cekSelisihGlobal();
        if(localStorage.getItem('theme') === 'dark') toggleTheme();
    };

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = "🌙 Dark Mode";
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = "☀️ Light Mode";
            localStorage.setItem('theme', 'dark');
        }
    }

    async function cekSelisihGlobal() {
        const units = [{ n: 'Gersik', g: '0' }, { n: 'Maridan', g: '1565950302' }];
        let globalDanger = false;

        for (let u of units) {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${u.g}&t=${Date.now()}`);
                const text = await res.text();
                const lines = text.split('\n').slice(1);
                let unresolved = lines.some(line => {
                    const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length < 4) return false;
                    const sel = col[2].replace(/"/g, "").trim();
                    const ket = col[3].replace(/"/g, "").toUpperCase().trim();
                    return (sel !== "-" && sel !== "0" && sel !== "" && ket !== "DONE");
                });

                if (unresolved) {
                    globalDanger = true;
                    document.getElementById('btn-' + u.n).innerHTML = `${u.n} <span class="notif-badge">ADA SELISIH</span>`;
                }
            } catch (e) { console.error("Sync Error"); }
        }
        if (globalDanger) document.getElementById('notif-banner').style.display = 'block';
    }

    async function muatData(nama, gid) {
        sheetSekarang = nama;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('detail').style.display = 'block';
        document.getElementById('unit-nama').innerText = "Unit: " + nama;
        const tb = document.getElementById('isi-tabel');
        tb.innerHTML = "<tr><td colspan='4'>Memuat...</td></tr>";

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            tb.innerHTML = "";

            lines.forEach(line => {
                const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                if (col.length < 2) return;
                const tgl = col[1], sel = col[2], ket = (col[3] || "").toUpperCase();
                const isAman = (sel === "-" || sel === "0" || sel === "");
                const isProblem = (!isAman && ket !== "DONE");

                tb.innerHTML += `
                    <tr class="${isProblem ? 'warning problem-row' : 'safe-row'}">
                        <td>${tgl}</td>
                        <td style="color:${isAman ? 'var(--accent-green)' : 'var(--accent-red)'}; font-weight:bold;">${isAman ? 'Aman' : 'Rp '+sel}</td>
                        <td>
                            <select id="sel-${tgl}" style="padding:4px; border-radius:5px;">
                                <option value="DONE" ${ket=="DONE"?'selected':''}>DONE</option>
                                <option value="PROSES" ${ket=="PROSES"?'selected':''}>PROSES</option>
                                <option value="" ${ket==""?'selected':''}>-</option>
                            </select>
                        </td>
                        <td><button class="btn-save" onclick="simpan('${tgl}')">OK</button></td>
                    </tr>`;
            });
        } catch (e) { tb.innerHTML = "<tr><td colspan='4'>Gagal muat data</td></tr>"; }
    }

    async function simpan(tgl) {
        const val = document.getElementById(`sel-${tgl}`).value;
        const btn = event.target;
        btn.innerText = "...";
        const url = `${WEB_APP_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(val)}&sheetName=${encodeURIComponent(sheetSekarang)}`;
        try {
            await fetch(url, { method: 'POST', mode: 'no-cors' });
            alert("Berhasil!");
            location.reload();
        } catch (e) { alert("Gagal!"); btn.innerText = "OK"; }
    }

    function jalankanFilter() {
        const cek = document.getElementById('toggleFilter').checked;
        document.querySelectorAll('.safe-row').forEach(r => r.style.display = cek ? 'none' : 'table-row');
    }
</script>
</body>
</html>
