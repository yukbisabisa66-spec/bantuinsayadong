<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM Monitor Pro - Bankaltimtara</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: linear-gradient(135deg, #003366 0%, #004e92 100%);
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent: #FACC15;
            --red: #FF453A;
            --green: #32D74B;
            --glass-border: rgba(255, 215, 0, 0.3);
        }

        .dark-mode {
            --bg-body: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            min-height: 100vh; background: var(--bg-body); 
            display: flex; justify-content: center; align-items: flex-start; padding: 20px; color: var(--text-main);
            transition: 0.5s;
        }

        .glass-card { 
            background: var(--card-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 25px; border-radius: 35px; border: 1px solid var(--glass-border);
            width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        #login-screen { text-align: center; margin-top: 10vh; }
        .pin-input {
            width: 100%; padding: 15px; border-radius: 15px; border: none; margin: 20px 0;
            background: rgba(255,255,255,0.2); color: white; text-align: center; font-size: 24px; letter-spacing: 10px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card small { font-size: 11px; opacity: 0.7; display: block; margin-bottom: 5px; }
        .stat-card b { font-size: 20px; color: var(--accent); }

        .table-container { background: rgba(0,0,0,0.2); border-radius: 20px; overflow: hidden; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: rgba(250, 204, 21, 0.2); padding: 12px; color: var(--accent); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        
        .btn-action { 
            width: 100%; padding: 18px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white;
            font-weight: 600; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        
        .notif-badge { width: 10px; height: 10px; background: var(--red); border-radius: 50%; display: none; box-shadow: 0 0 10px var(--red); }
        .btn-ok { background: var(--accent); color: #003366; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-back { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; padding: 12px; border-radius: 15px; margin-top: 15px; cursor: pointer; }

        .hidden { display: none !important; }
        canvas { margin-bottom: 20px; max-height: 200px; }
        
        select { background: #fff; border-radius: 5px; padding: 2px; font-size: 11px; }
    </style>
</head>
<body>

<div id="login-screen" class="glass-card">
    <h1 style="font-size: 50px;">🏦</h1>
    <h2 style="margin: 10px 0;">ATM Monitor</h2>
    <p style="opacity: 0.6; font-size: 13px;">Masukkan Passcode</p>
    <input type="password" id="passcode" class="pin-input" placeholder="••••" maxlength="4">
    <button class="btn-action" style="background: var(--accent); color: #003366; justify-content: center;" onclick="checkLogin()">MASUK</button>
</div>

<div id="main-dashboard" class="glass-card hidden">
    <div class="header">
        <div>
            <p id="greeting" style="font-size: 12px; opacity: 0.7;"></p>
            <h3 style="color: var(--accent);">Admin Bankaltimtara</h3>
        </div>
        <button onclick="toggleTheme()" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 10px; border-radius:10px; font-size:11px;">🌓 TEMA</button>
    </div>

    <div class="stats-row">
        <div class="stat-card"><small>TOTAL DONE</small><b id="total-done">0</b></div>
        <div class="stat-card"><small>TOTAL SELISIH</small><b id="total-pending" style="color: var(--red);">0</b></div>
    </div>

    <canvas id="statChart"></canvas>

    <div id="unit-buttons">
        <button class="btn-action" onclick="muatData('Gersik', '0')">
            Unit Gersik <span id="dot-Gersik" class="notif-badge"></span>
        </button>
        <button class="btn-action" onclick="muatData('Maridan', '1565950302')">
            Unit Maridan <span id="dot-Maridan" class="notif-badge"></span>
        </button>
    </div>
    
    <p onclick="location.reload()" style="text-align:center; margin-top:20px; font-size:12px; opacity:0.5; cursor:pointer;">Logout / Keluar</p>
</div>

<div id="detail-unit" class="glass-card hidden">
    <h3 id="nama-unit-header" style="text-align:center; color:var(--accent); margin-bottom:15px;"></h3>
    <div class="table-container">
        <table>
            <thead>
                <tr><th>Tanggal</th><th>Nominal</th><th>Aksi</th></tr>
            </thead>
            <tbody id="tabel-body"></tbody>
        </table>
    </div>
    <button class="btn-back" onclick="backToMenu()">⬅ KEMBALI</button>
</div>

<script>
    const PUB_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRb6GSybyMkKf6JkokVF42Q-nIca3R6yuEGkbSwcgfF8qZbp8J293LHtXGKGB7VVA/pub?output=csv";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw0XNO14T6ZtEO5td5ylJSs3gEQdFY4zdmHfCwO728PxUf5OLaDp5EJ5yN4GShIBia7Hw/exec";
    const PASSCODE = "1234";

    let globalStats = { done: 0, pending: 0 };
    let activeSheet = "";
    let myChartInstance = null;

    function checkLogin() {
        if(document.getElementById('passcode').value === PASSCODE) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            initDashboard();
        } else {
            alert("Passcode Salah!");
            document.getElementById('passcode').value = "";
        }
    }

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    async function initDashboard() {
        const jam = new Date().getHours();
        let salam = jam < 11 ? "Selamat Pagi," : jam < 15 ? "Selamat Siang," : jam < 19 ? "Selamat Sore," : "Selamat Malam,";
        document.getElementById('greeting').innerText = salam;

        globalStats = { done: 0, pending: 0 };
        const units = [{ n: 'Gersik', g: '0' }, { n: 'Maridan', g: '1565950302' }];

        for (let u of units) {
            try {
                const res = await fetch(`${PUB_URL}&gid=${u.g}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                
                let hasUnresolved = false;
                rows.forEach(row => {
                    const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(col.length >= 4) {
                        const selVal = col[2].replace(/"/g, "").trim();
                        const ketVal = col[3].replace(/"/g, "").toUpperCase().trim();
                        if(selVal && selVal !== "0" && selVal !== "-") {
                            if(ketVal === "DONE") globalStats.done++;
                            else {
                                globalStats.pending++;
                                hasUnresolved = true;
                            }
                        }
                    }
                });
                document.getElementById('dot-'+u.n).style.display = hasUnresolved ? 'block' : 'none';
            } catch (e) { console.error("Error fetching " + u.n); }
        }
        
        document.getElementById('total-done').innerText = globalStats.done;
        document.getElementById('total-pending').innerText = globalStats.pending;
        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('statChart').getContext('2d');
        if (myChartInstance) { myChartInstance.destroy(); }

        const isGreenFull = globalStats.pending === 0;
        const dataArr = isGreenFull ? [1, 0] : [globalStats.done, globalStats.pending];
        const colorArr = isGreenFull ? [ '#32D74B', '#32D74B' ] : [ '#32D74B', '#FF453A' ];

        myChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Selesai', 'Selisih'],
                datasets: [{
                    data: dataArr,
                    backgroundColor: colorArr,
                    borderWidth: 0
                }]
            },
            options: { 
                cutout: '80%', 
                plugins: { legend: { labels: { color: 'white' } } } 
            }
        });
    }

    async function muatData(nama, gid) {
        activeSheet = nama;
        document.getElementById('main-dashboard').classList.add('hidden');
        document.getElementById('detail-unit').classList.remove('hidden');
        document.getElementById('nama-unit-header').innerText = "Unit: " + nama;
        
        const tb = document.getElementById('tabel-body');
        tb.innerHTML = "<tr><td colspan='3'>Memuat data...</td></tr>";

        try {
            const res = await fetch(`${PUB_URL}&gid=${gid}&t=${Date.now()}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            tb.innerHTML = "";

            rows.forEach(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, ""));
                if(col[1]) {
                    const isProblem = (col[2] && col[2] !== "0" && col[2] !== "-" && col[3].toUpperCase() !== "DONE");
                    tb.innerHTML += `
                        <tr style="background: ${isProblem ? 'rgba(255,69,58,0.1)' : 'transparent'}">
                            <td>${col[1]}</td>
                            <td style="color:${isProblem ? 'var(--red)' : 'var(--green)'}">${col[2] === "0" || !col[2] ? 'Aman' : 'Rp '+col[2]}</td>
                            <td>
                                <select id="stat-${col[1]}">
                                    <option value="DONE" ${col[3].toUpperCase()==='DONE'?'selected':''}>DONE</option>
                                    <option value="PROSES" ${col[3].toUpperCase()==='PROSES'?'selected':''}>PROSES</option>
                                </select>
                                <button class="btn-ok" onclick="updateStatus('${col[1]}')">OK</button>
                            </td>
                        </tr>`;
                }
            });
        } catch (e) { tb.innerHTML = "<tr><td colspan='3'>Gagal memuat data</td></tr>"; }
    }

    async function updateStatus(tgl) {
        const stat = document.getElementById(`stat-${tgl}`).value;
        const btn = event.target;
        btn.innerText = "...";
        const url = `${WEB_APP_URL}?tanggal=${encodeURIComponent(tgl)}&status=${encodeURIComponent(stat)}&sheetName=${encodeURIComponent(activeSheet)}`;
        
        try {
            await fetch(url, { method: 'POST', mode: 'no-cors' });
            alert("Berhasil!");
            location.reload();
        } catch (e) {
            alert("Gagal memperbarui");
            btn.innerText = "OK";
        }
    }

    function backToMenu() {
        document.getElementById('detail-unit').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
    }
</script>
</body>
</html>
