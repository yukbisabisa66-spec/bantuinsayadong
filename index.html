<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Monitor Pro - Bankaltimtara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #004e92; color: white; padding: 15px; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 20px; border-radius: 25px; border: 1px solid white; width: 100%; max-width: 600px; }
        
        .filter-area { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .table-area { background: white; color: black; border-radius: 15px; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #facc15; color: #004e92; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .warning { background: #ffebee !important; }
        .no-selisih { color: #2e7d32; font-weight: bold; }
        .ada-selisih { color: #d32f2f; font-weight: bold; }
        .row-hidden { display: none !important; }

        select { padding: 4px; border-radius: 4px; font-size: 10px; }
        .btn-save { background: #004e92; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-menu { width: 100%; margin-top: 10px; padding: 12px; background: white; color: #004e92; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="glass-card">
    <div id="menu">
        <h2 style="text-align:center; color:#facc15; margin-bottom:15px;">Dashboard ATM</h2>
        <button class="btn-menu" onclick="muatData('Gersik', '0')">UNIT GERSIK</button>
        <button class="btn-menu" onclick="muatData('Maridan', '1565950302')">UNIT MARIDAN</button>
    </div>

    <div id="detail" style="display:none;">
        <h3 id="unit-nama" style="color:#facc15; text-align:center; margin-bottom:10px;"></h3>
        
        <div class="filter-area">
            <span>⚠️ Hanya Selisih & Belum Done</span>
            <input type="checkbox" id="toggleFilter" onchange="jalankanFilter()">
        </div>

        <div class="table-area">
            <table>
                <thead><tr><th>Tgl</th><th>Selisih</th><th>Aksi Status</th></tr></thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
        <button class="btn-menu" onclick="location.reload()">KEMBALI</button>
    </div>
</div>

<script>
    const SSID = "1rFuTdUTSuUeQQAZDB7QPngRvDwkTh34ZtrUxYo9Zu7U";
    // MASUKKAN URL YANG KAMU DAPAT SETELAH KLIK "TERAPKAN" DI SINI
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw0XNO14T6ZtEO5td5ylJSs3gEQdFY4zdmHfCwO728PxUf5OLaDp5EJ5yN4GShIBia7Hw/exec";
    let sheetSekarang = "";

    async function muatData(nama, gid) {
        sheetSekarang = nama;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('detail').style.display = 'block';
        document.getElementById('unit-nama').innerText = "Unit: " + nama;
        const tb = document.getElementById('isi-tabel');
        tb.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Memuat data...</td></tr>";

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SSID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            tb.innerHTML = "";

            lines.forEach(line => {
                const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
                const tgl = col[1];
                const sel = col[2];
                const ket = (col[3] || "").toUpperCase();

                if (tgl && tgl !== "null") {
                    const isNoSelisih = (sel === "-" || sel === "0" || sel === "");
                    const isProblem = (!isNoSelisih && ket !== "DONE");
                    
                    tb.innerHTML += `
                        <tr class="${isProblem ? 'warning problem-row' : 'safe-row'}">
                            <td>${tgl}</td>
                            <td class="${isNoSelisih ? 'no-selisih' : 'ada-selisih'}">${isNoSelisih ? 'Tidak Ada Selisih' : 'Rp '+sel}</td>
                            <td>
                                <select id="sel-${tgl}">
                                    <option value="" ${ket==""?'selected':''}>-</option>
                                    <option value="DONE" ${ket=="DONE"?'selected':''}>DONE</option>
                                    <option value="PROSES" ${ket=="PROSES"?'selected':''}>PROSES</option>
                                </select>
                                <button class="btn-save" onclick="simpanKeSheet('${tgl}')">Ok</button>
                            </td>
                        </tr>`;
                }
            });
        } catch (e) { tb.innerHTML = "<tr><td colspan='3'>Error Koneksi</td></tr>"; }
    }

    async function simpanKeSheet(tgl) {
        const val = document.getElementById(`sel-${tgl}`).value;
        if(!val) return alert("Pilih status!");
        
        const btn = event.target;
        btn.innerText = "...";
        
        const fd = new FormData();
        fd.append('tanggal', tgl);
        fd.append('status', val);
        fd.append('sheetName', sheetSekarang);

        try {
            // Kirim data ke Apps Script
            await fetch(WEB_APP_URL, { method: 'POST', body: fd, mode: 'no-cors' });
            alert("Berhasil disimpan!");
            btn.innerText = "Ok";
        } catch (e) { alert("Gagal!"); btn.innerText = "Ok"; }
    }

    function jalankanFilter() {
        const cek = document.getElementById('toggleFilter').checked;
        document.querySelectorAll('.safe-row').forEach(r => r.style.display = cek ? 'none' : 'table-row');
    }
</script>
</body>
</html>
